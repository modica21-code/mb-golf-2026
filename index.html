<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>MB 2026 · Quota Cup</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0e1a; --bg2:#0f1524; --card:#151b2e; --card2:#1a2138;
  --border:#252d45; --text:#e8ecf4; --muted:#8892a8; --dim:#5a6378;
  --t1:#d4b06a; --t1d:#b5934f; --t2:#4aa3d9; --t2d:#3885b8;
  --good:#4ade80; --bad:#f87171; --warn:#fbbf24;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
html,body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
body { min-height:100vh; min-height:100dvh; padding-bottom:env(safe-area-inset-bottom); }
#app { max-width:520px; margin:0 auto; padding:0 14px 80px; padding-top:env(safe-area-inset-top); }
.top { padding:14px 0 10px; border-bottom:1px solid var(--border); margin-bottom:14px; position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 85%,transparent); z-index:10; padding-top:calc(14px + env(safe-area-inset-top)); display:flex; justify-content:space-between; align-items:center; }
.top h1 { font-size:15px; font-weight:600; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.top h1 .cup { color:var(--t1); }
.backbtn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:500; font-family:inherit; }
.backbtn:active { transform:scale(.96); }
.tabs { display:flex; gap:6px; padding:4px; background:var(--card); border-radius:12px; margin-bottom:16px; }
.tab { flex:1; padding:10px 6px; text-align:center; border-radius:8px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; border:none; background:transparent; font-family:inherit; }
.tab.active { background:var(--card2); color:var(--text); box-shadow:var(--shadow); }
.tab:active:not(.active) { background:var(--bg2); }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; }
.card.flat { padding:0; overflow:hidden; }
.scoreboard { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.team-card { padding:14px 12px; border-radius:14px; background:var(--card); border:1px solid var(--border); position:relative; overflow:hidden; }
.team-card.t1 { border-left:4px solid var(--t1); }
.team-card.t2 { border-left:4px solid var(--t2); }
.team-card .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:600; letter-spacing:.5px; margin-bottom:4px; }
.team-card .big { font-size:32px; font-weight:700; line-height:1; margin-bottom:2px; font-variant-numeric:tabular-nums; }
.team-card.t1 .big { color:var(--t1); }
.team-card.t2 .big { color:var(--t2); }
.team-card .sub { font-size:11px; color:var(--dim); }
.team-card.leading::after { content:"LEAD"; position:absolute; top:6px; right:8px; font-size:9px; font-weight:700; letter-spacing:.8px; color:var(--good); background:rgba(74,222,128,.12); padding:2px 6px; border-radius:4px; }
.sec-h { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; font-weight:600; margin:20px 4px 8px; display:flex; justify-content:space-between; align-items:center; }
.round-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; }
.round-card:active { transform:scale(.99); }
.round-card .rnum { display:inline-block; width:22px; height:22px; background:var(--bg2); border-radius:6px; text-align:center; line-height:22px; font-size:11px; font-weight:700; color:var(--muted); margin-right:8px; }
.round-card.done .rnum { background:var(--t1); color:var(--bg); }
.round-card.active .rnum { background:var(--warn); color:var(--bg); }
.round-card .rt { font-size:15px; font-weight:600; }
.round-card .rs { font-size:12px; color:var(--muted); margin-left:30px; }
.round-card .rscore { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:13px; }
.round-card .rscore .ts { display:flex; gap:16px; }
.round-card .rscore .ts-1 { color:var(--t1); font-weight:600; }
.round-card .rscore .ts-2 { color:var(--t2); font-weight:600; }
.round-card .rscore .rw { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.lb { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.lb-row { display:grid; grid-template-columns:26px 1fr 50px 60px; align-items:center; padding:9px 12px; border-bottom:1px solid var(--border); font-size:14px; cursor:pointer; }
.lb-row:last-child { border-bottom:none; }
.lb-row:active { background:var(--bg2); }
.lb-row .rk { color:var(--dim); font-size:12px; font-variant-numeric:tabular-nums; }
.lb-row .nm { display:flex; align-items:center; gap:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-row .tdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.lb-row .tdot.t1 { background:var(--t1); }
.lb-row .tdot.t2 { background:var(--t2); }
.lb-row .q { text-align:right; color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
.lb-row .sc { text-align:right; font-weight:600; font-variant-numeric:tabular-nums; }
.lb-row .sc.pos { color:var(--good); }
.lb-row .sc.neg { color:var(--bad); }
.lb-hd { display:grid; grid-template-columns:26px 1fr 50px 60px; padding:8px 12px; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; font-weight:600; background:var(--bg2); border-bottom:1px solid var(--border); }
.lb-hd .q, .lb-hd .sc { text-align:right; }
.group-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; }
.group-card:active { transform:scale(.99); }
.group-h { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.group-h .gt { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.group-pls { display:flex; flex-wrap:wrap; gap:6px; }
.chip { display:inline-flex; align-items:center; gap:5px; padding:5px 9px; background:var(--bg2); border-radius:20px; font-size:12px; border:1px solid var(--border); }
.chip .cd { width:6px; height:6px; border-radius:50%; }
.chip .cd.t1 { background:var(--t1); }
.chip .cd.t2 { background:var(--t2); }
.chip .csc { margin-left:4px; font-weight:600; font-variant-numeric:tabular-nums; }
.chip .csc.pos { color:var(--good); }
.chip .csc.neg { color:var(--bad); }
.sc-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:12px; }
.sc-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.sc-table { border-collapse:collapse; min-width:100%; font-size:12px; }
.sc-table th, .sc-table td { padding:6px 4px; text-align:center; border-right:1px solid var(--border); border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; min-width:32px; }
.sc-table th { background:var(--bg2); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.sc-table .lbl-col { text-align:left; background:var(--card2); font-weight:500; min-width:84px; max-width:84px; position:sticky; left:0; z-index:2; border-right:2px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:10px; }
.sc-table thead .lbl-col { z-index:3; background:var(--bg2); }
.sc-table .tot-col { background:var(--card2); font-weight:600; }
.sc-table .par-row td { background:var(--bg2); color:var(--muted); font-size:11px; font-weight:500; }
.sc-table .sc-cell.eagle { background:rgba(251,191,36,.25); color:var(--warn); font-weight:700; }
.sc-table .sc-cell.birdie { background:rgba(74,222,128,.15); color:var(--good); font-weight:600; }
.sc-table .sc-cell.par { color:var(--text); }
.sc-table .sc-cell.bogey { color:var(--muted); }
.sc-table .sc-cell.bad { color:var(--dim); }
.sc-table .sc-inp { width:100%; height:30px; background:transparent; border:none; color:inherit; text-align:center; font-size:13px; font-family:inherit; font-variant-numeric:tabular-nums; padding:0; outline:none; font-weight:inherit; }
.sc-table .sc-inp:focus { background:var(--warn); color:var(--bg); }
.qbar { display:flex; justify-content:space-between; padding:10px 14px; background:var(--card); font-size:12px; border-bottom:1px solid var(--border); }
.qbar:last-child { border-bottom:none; }
.qbar .qlbl { color:var(--muted); text-transform:uppercase; font-size:10px; letter-spacing:.6px; font-weight:600; }
.qbar .qv { font-weight:600; font-variant-numeric:tabular-nums; }
.qbar .qv.pos { color:var(--good); }
.qbar .qv.neg { color:var(--bad); }
.settings-grp { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:8px; }
.par-inp { width:100%; height:32px; background:var(--bg2); border:1px solid var(--border); color:var(--text); text-align:center; border-radius:6px; font-size:12px; font-family:inherit; font-variant-numeric:tabular-nums; }
.par-inp:focus { outline:1px solid var(--warn); background:var(--card); }
.foot { text-align:center; color:var(--dim); font-size:11px; padding:20px 0; line-height:1.6; }
.note { background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.3); color:var(--warn); padding:8px 12px; border-radius:8px; font-size:12px; margin-bottom:10px; }
.pill { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
.pill.t1 { background:rgba(212,176,106,.15); color:var(--t1); }
.pill.t2 { background:rgba(74,163,217,.15); color:var(--t2); }
.pill.live { background:rgba(74,222,128,.15); color:var(--good); }
.pill.done { background:rgba(138,146,168,.15); color:var(--muted); }
.legend { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--muted); padding:8px 0; }
.legend b { color:var(--text); margin-right:3px; }
.phead { padding:12px; background:var(--card2); border-bottom:1px solid var(--border); }
.phead .pn { font-size:15px; font-weight:600; }
.phead .pm { font-size:11px; color:var(--muted); margin-top:4px; }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; }
.dot.t1 { background:var(--t1); }
.dot.t2 { background:var(--t2); }
.row { display:flex; gap:10px; }
.row > * { flex:1; }

/* Login screen */
.login-wrap { min-height:90vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.login-card { width:100%; max-width:360px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 22px; text-align:center; box-shadow:var(--shadow); }
.login-logo { font-size:46px; margin-bottom:6px; }
.login-h { font-size:20px; font-weight:700; margin:0 0 4px; }
.login-sub { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:22px; }
.login-form { margin-bottom:18px; }
.login-inp { width:100%; padding:13px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:16px; font-family:inherit; outline:none; margin-bottom:10px; text-align:center; letter-spacing:.5px; }
.login-inp:focus { border-color:var(--t1); }
.login-btn { width:100%; padding:13px; background:var(--t1); color:var(--bg); border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:.7px; }
.login-btn:active { background:var(--t1d); }
.login-err { margin-top:10px; padding:8px; background:rgba(248,113,113,.1); color:var(--bad); border-radius:6px; font-size:12px; }
.login-hint { font-size:12px; color:var(--muted); line-height:1.6; padding-top:14px; border-top:1px solid var(--border); }

/* User pill in top bar */
.user-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; background:var(--bg2); border:1px solid var(--border); border-radius:14px; font-size:11px; color:var(--text); cursor:pointer; font-family:inherit; }
.user-pill .ud { width:6px; height:6px; border-radius:50%; background:var(--good); }
.user-pill.admin .ud { background:var(--warn); }

/* Round / Group switcher on score page */
.gsw-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:600; letter-spacing:.6px; margin:8px 4px 6px; }
.gsw { display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:10px; padding-bottom:4px; }
.gsw::-webkit-scrollbar { display:none; }
.gsw-btn { flex-shrink:0; background:var(--card); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:10px; font-family:inherit; cursor:pointer; display:flex; flex-direction:column; align-items:flex-start; gap:2px; min-width:68px; }
.gsw-btn .gsw-n { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.4px; }
.gsw-btn .gsw-s { font-size:11px; color:var(--dim); white-space:nowrap; }
.gsw-btn.act { background:var(--t1); border-color:var(--t1); }
.gsw-btn.act .gsw-n { color:var(--bg); }
.gsw-btn.act .gsw-s { color:rgba(10,14,26,.7); }
.gsw-btn:active { transform:scale(.97); }

/* Bottom nav bar */
body { padding-bottom:calc(74px + env(safe-area-inset-bottom,0)) !important; }
.bnav { position:fixed; left:0; right:0; bottom:0; background:var(--bg); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr 1.2fr 1fr; z-index:100; padding-bottom:env(safe-area-inset-bottom,0); box-shadow:0 -4px 14px rgba(0,0,0,.4); }
.bnav-btn { background:transparent; border:none; color:var(--muted); padding:10px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; font-family:inherit; transition:color .1s; }
.bnav-btn .bn-ic { font-size:19px; line-height:1; }
.bnav-btn .bn-lbl { font-size:10px; font-weight:600; letter-spacing:.3px; }
.bnav-btn.act { color:var(--text); }
.bnav-btn:active { background:var(--bg2); }
.bnav-btn.bnav-score { background:var(--t1); color:var(--bg); border-radius:0; margin:6px 4px; padding:8px 4px; border-radius:10px; }
.bnav-btn.bnav-score.act { background:var(--t1d); }
.bnav-btn.bnav-score .bn-lbl { font-weight:700; }

/* Hole-by-hole scoring view */
.sc-mode-toggle { display:flex; gap:4px; background:var(--bg2); border-radius:10px; padding:3px; margin-bottom:12px; }
.sc-mode-toggle button { flex:1; padding:8px 10px; border-radius:7px; border:none; background:transparent; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:.5px; }
.sc-mode-toggle button.active { background:var(--card2); color:var(--text); box-shadow:var(--shadow); }

.hs-hdr { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; text-align:center; }
.hs-hdr .hnum { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
.hs-hdr .hpar { font-size:40px; font-weight:800; line-height:1.05; margin-top:2px; font-variant-numeric:tabular-nums; }
.hs-hdr .hlbl { font-size:11px; color:var(--dim); margin-top:3px; text-transform:uppercase; letter-spacing:.7px; }

.hs-strip { display:flex; gap:3px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:6px 0; margin-bottom:12px; }
.hs-strip .hcell { flex-shrink:0; min-width:30px; padding:6px 2px; text-align:center; background:var(--bg2); border:1px solid var(--border); border-radius:6px; font-size:11px; font-variant-numeric:tabular-nums; cursor:pointer; color:var(--muted); }
.hs-strip .hcell.act { background:var(--warn); color:var(--bg); border-color:var(--warn); font-weight:700; }
.hs-strip .hcell.has { background:var(--card2); color:var(--text); }
.hs-strip .hcell .num { font-size:9px; color:var(--dim); display:block; }
.hs-strip .hcell.act .num { color:var(--bg); }

.hs-plr { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:8px; display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
.hs-plr .hs-nm { display:flex; flex-direction:column; gap:2px; min-width:0; }
.hs-plr .hs-nm .n { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
.hs-plr .hs-nm .m { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.hs-plr .hs-step { display:flex; align-items:center; gap:4px; }
.hs-plr .hs-step button { width:40px; height:40px; border-radius:10px; border:1px solid var(--border); background:var(--bg2); color:var(--text); font-size:18px; font-weight:700; cursor:pointer; font-family:inherit; }
.hs-plr .hs-step button:active { background:var(--card2); }
.hs-plr .hs-step .hs-val { min-width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; background:var(--bg2); border:2px solid var(--border); }
.hs-plr .hs-step .hs-val.empty { color:var(--dim); border-style:dashed; }
.hs-plr .hs-step .hs-val.eagle { background:rgba(251,191,36,.2); color:var(--warn); border-color:var(--warn); }
.hs-plr .hs-step .hs-val.birdie { background:rgba(74,222,128,.15); color:var(--good); border-color:var(--good); }
.hs-plr .hs-step .hs-val.par { color:var(--text); border-color:var(--text); }
.hs-plr .hs-step .hs-val.bogey { color:var(--muted); }
.hs-plr .hs-step .hs-val.bad { color:var(--bad); }

.hs-nav { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
.hs-nav button { padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.hs-nav button:active { background:var(--bg2); }
.hs-nav button.next { background:var(--t1); color:var(--bg); border-color:var(--t1); }
.hs-nav button:disabled { opacity:.3; }
.hs-quota-strip { display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; margin-top:12px; }
.hs-quota-strip.g2 { grid-template-columns:repeat(2, 1fr); }
.hs-quota-strip .qq { text-align:center; padding:6px; background:var(--bg2); border-radius:8px; }
.hs-quota-strip .qq .qn { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-bottom:2px; }
.hs-quota-strip .qq .qg { font-size:13px; font-variant-numeric:tabular-nums; margin-top:2px; }
.hs-quota-strip .qq .qg.pos { color:var(--good); }
.hs-quota-strip .qq .qg.neg { color:var(--bad); }
.hs-quota-strip .qq .qd { font-size:11px; color:var(--dim); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PLAYERS = [
  {id:'marty',  name:'Marty',  full:'Martin Tait',         hi:3.4,  t:1},
  {id:'tumolo', name:'Mark',   full:'Mark Tumolo',         hi:11.3, t:1},
  {id:'carson', name:'Carson', full:'Carson Brooks',       hi:13.5, t:1},
  {id:'bwu',    name:'Bwu',    full:'Michael Biedrzycki',  hi:16.9, t:1},
  {id:'bill',   name:'Bill',   full:'William Benner',      hi:26.0, t:1},
  {id:'modes',  name:'Modes',  full:'Michael Modica',      hi:4.0,  t:1},
  {id:'matteo', name:'Matteo', full:'Matteo Murgia',       hi:26.3, t:1},
  {id:'andrew', name:'Andrew', full:'Andrew Benner',       hi:15.3, t:2},
  {id:'scott',  name:'Scott',  full:'Scott Kireger',       hi:8.3,  t:2},
  {id:'hill',   name:'Hill',   full:'Mark Hill',           hi:0.7,  t:2},
  {id:'pisano', name:'Pisano', full:'Anthony Pisano',      hi:11.7, t:2},
  {id:'anish',  name:'Anish',  full:'Anish Choksi',        hi:14.0, t:2},
  {id:'carter', name:'Carter', full:'Michael Carter',      hi:22.0, t:2},
  {id:'bob',    name:'Bob',    full:'Robert Biedrzycki',   hi:30.0, t:2}
];
const PMAP = Object.fromEntries(PLAYERS.map(p => [p.id, p]));

const DEFAULT_PAR = [4,4,3,4,5,4,3,4,5,4,4,3,5,4,3,4,4,5];
const SEED = {};
const PAR_SEED = {};
const FB_URL = "https://mb-golf-2026-default-rtdb.firebaseio.com";
async function fbLoad() { try { const r = await fetch(FB_URL + "/mbquota.json"); return await r.json(); } catch(e) { return null; } }
async function fbPut(data) { try { return await fetch(FB_URL + "/mbquota.json", {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}); } catch(e){} }
async function fbPatch(path, data) { try { return await fetch(FB_URL + "/mbquota/" + path + ".json", {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}); } catch(e){} }
function fbSubscribe() {
  if (!window.EventSource) { setInterval(syncFromFB, 8000); return; }
  try {
    const es = new EventSource(FB_URL + "/mbquota.json");
    es.addEventListener('put', syncFromFB);
    es.addEventListener('patch', syncFromFB);
    es.onerror = () => { es.close(); setTimeout(fbSubscribe, 3000); };
  } catch(e) { setInterval(syncFromFB, 8000); }
}
async function syncFromFB() {
  const d = await fbLoad();
  if (!d) return;
  S.scores = d.scores || {};
  S.pars = d.pars || {};
  S.chcp = d.chcp || {};
  S.locks = d.locks || {};
  render();
}
let S = { view:'home', rId:null, gIdx:null, pId:null, scores:{}, pars:{}, chcp:{}, locks:{}, subTab:'standings', scHole:0, scMode:'hole' };
try { const lg = JSON.parse(localStorage.getItem('mbq.lastGroup')||'null'); if (lg && lg.rId) { S._lastGroup = lg; } } catch(e){}
try { const m = localStorage.getItem('mbq.scMode'); if (m==='card'||m==='hole') S.scMode = m; } catch(e){}
try { const u = localStorage.getItem('mbq.user'); if (u) S._user = u; } catch(e){}

/* AUTH ─────────────────────────────────────────
   Password = lastname123 OR nickname123 (case-insensitive)
   admin123 = full admin access
   ─────────────────────────────────────────── */
function lastNameOf(p) {
  return (p.full || '').split(' ').slice(-1)[0].toLowerCase();
}
function authMatch(pw) {
  if (!pw) return null;
  const k = pw.trim().toLowerCase().replace(/\s+/g,'');
  if (k === 'admin123') return 'admin';
  // Disambiguate Biedrzycki (Bwu and Bob both): force them to use nicknames
  if (k === 'biedrzycki123') return null;
  for (const p of PLAYERS) {
    if (k === lastNameOf(p) + '123') return p.id;
    if (k === p.name.toLowerCase() + '123') return p.id;
    if (k === p.id.toLowerCase() + '123') return p.id;
  }
  return null;
}
function currentUser() {
  // Returns {kind:'admin'} | {kind:'player', p, pid} | null
  if (!S._user) return null;
  if (S._user === 'admin') return { kind:'admin' };
  const p = PMAP[S._user];
  if (!p) return null;
  return { kind:'player', p, pid:p.id };
}
function isAdmin() { const u = currentUser(); return !!(u && u.kind === 'admin'); }
function userPlayerId() { const u = currentUser(); return u && u.kind==='player' ? u.pid : null; }
function userCanEditGroup(rId, gIdx) {
  if (isAdmin()) return true;
  const pid = userPlayerId();
  if (!pid) return false;
  const r = ROUNDS.find(x => x.id === rId);
  if (!r || !r.groups[gIdx]) return false;
  return r.groups[gIdx].includes(pid);
}
function loginAs(pw) {
  const result = authMatch(pw);
  if (!result) { return false; }
  S._user = result;
  try { localStorage.setItem('mbq.user', result); } catch(e){}
  // Default last group to logged-in player's first round/group
  if (result !== 'admin' && !S._lastGroup) {
    for (const r of ROUNDS) {
      const gIdx = r.groups.findIndex(g => g.includes(result));
      if (gIdx >= 0) {
        S._lastGroup = { rId:r.id, gIdx };
        try { localStorage.setItem('mbq.lastGroup', JSON.stringify(S._lastGroup)); } catch(e){}
        break;
      }
    }
  }
  S.view = 'home';
  render();
  return true;
}
function logout() {
  S._user = null;
  try { localStorage.removeItem('mbq.user'); } catch(e){}
  render();
}
function userLabel() {
  const u = currentUser();
  if (!u) return '';
  if (u.kind === 'admin') return 'Admin';
  return u.p.name;
}
function courseHcp(pId) { if (S.chcp[pId] != null) return S.chcp[pId]; return Math.round(PMAP[pId].hi); }
function quotaFor(pId) { return 36 - courseHcp(pId); }
function parsFor(rId) { const p = S.pars[rId]; return (p && p.length === 18) ? p : DEFAULT_PAR; }
function pointsForHole(score, par) {
  if (!score || score < 1) return null;
  const d = score - par;
  if (d <= -3) return 16;
  if (d === -2) return 8;
  if (d === -1) return 4;
  if (d === 0)  return 2;
  if (d === 1)  return 1;
  return 0;
}
function pointsForPlayerRound(pId, rId) {
  const sc = (S.scores[rId] || {})[pId];
  if (!sc) return {pts:0, holes:0, gross:0, toPar:0};
  const pars = parsFor(rId);
  let pts = 0, holes = 0, gross = 0, parSum = 0;
  for (let i = 0; i < 18; i++) {
    const s = parseInt(sc[i]);
    if (s && s > 0) { pts += pointsForHole(s, pars[i]); holes++; gross += s; parSum += pars[i]; }
  }
  return {pts, holes, gross, toPar: gross - parSum};
}
function quotaDiffFor(pId, rId) {
  const r = pointsForPlayerRound(pId, rId);
  const q = quotaFor(pId);
  if (r.holes === 0) return {diff:0, pts:0, q, holes:0, gross:0, toPar:0};
  return {diff: r.pts - q, pts:r.pts, q, holes:r.holes, gross:r.gross, toPar:r.toPar};
}
function teamRoundScore(tNum, rId) {
  let total = 0, any = false, allFull = true;
  PLAYERS.filter(p => p.t === tNum).forEach(p => {
    const {diff, holes} = quotaDiffFor(p.id, rId);
    if (holes > 0) any = true;
    if (holes < 18) allFull = false;
    total += diff;
  });
  return {total, complete: allFull, any};
}
function roundStatus(rId) {
  const t1 = teamRoundScore(1, rId), t2 = teamRoundScore(2, rId);
  if (!t1.any && !t2.any) return 'upcoming';
  if (t1.complete && t2.complete) return 'done';
  return 'active';
}
function tripScore(tNum) { let total = 0; ROUNDS.forEach(r => { total += teamRoundScore(tNum, r.id).total; }); return total; }
function go(view, opts) {
  opts = opts || {};
  const groupChanged = (opts.rId !== undefined && opts.rId !== S.rId) || (opts.gIdx !== undefined && opts.gIdx !== S.gIdx);
  S.view = view;
  if (opts.rId !== undefined) S.rId = opts.rId;
  if (opts.gIdx !== undefined) S.gIdx = opts.gIdx;
  if (opts.pId !== undefined) S.pId = opts.pId;
  if (opts.subTab !== undefined) S.subTab = opts.subTab;
  if (view === 'group') {
    try { localStorage.setItem('mbq.lastGroup', JSON.stringify({rId:S.rId, gIdx:S.gIdx})); } catch(e){}
    if (groupChanged) S.scHole = firstUnscoredHole(S.rId, S.gIdx);
  }
  window.scrollTo(0, 0);
  render();
}
function firstUnscoredHole(rId, gIdx) {
  const r = ROUNDS.find(x => x.id === rId);
  if (!r) return 0;
  const g = r.groups[gIdx] || [];
  for (let i = 0; i < 18; i++) {
    for (const pid of g) {
      const sc = (S.scores[rId] || {})[pid] || [];
      if (!parseInt(sc[i])) return i;
    }
  }
  return 0;
}
function setScMode(m) {
  S.scMode = m;
  try { localStorage.setItem('mbq.scMode', m); } catch(e){}
  render();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDiff(n) { if (n === 0) return 'E'; return (n > 0 ? '+' : '') + n; }
function diffClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
function render() {
  const app = document.getElementById('app');
  if (!currentUser()) { app.innerHTML = renderLogin(); return; }
  let html = '';
  if      (S.view === 'home')   html = renderHome();
  else if (S.view === 'round')  html = renderRound();
  else if (S.view === 'group')  html = renderGroup();
  else if (S.view === 'player') html = renderPlayer();
  else if (S.view === 'setup')  { if (isAdmin()) html = renderSetup(); else html = renderHome(); }
  else html = renderHome();
  app.innerHTML = html + renderBottomNav();
}

function renderBottomNav() {
  const atHome = S.view === 'home';
  const atScore = S.view === 'group';
  const atAdmin = S.view === 'setup';
  const atRounds = atHome && S.subTab === 'standings';
  const atPlayers = atHome && S.subTab === 'players';
  const admin = isAdmin();

  // Score button target: last group > logged-in player's first group > first active round
  let scoreHandler = `pickScoreTarget()`;
  const myPid = userPlayerId();
  if (S._lastGroup) {
    scoreHandler = `go('group',{rId:'${S._lastGroup.rId}',gIdx:${S._lastGroup.gIdx}})`;
  } else if (myPid) {
    // Find first round/group containing this player
    for (const r of ROUNDS) {
      const gIdx = r.groups.findIndex(g => g.includes(myPid));
      if (gIdx >= 0) {
        scoreHandler = `go('group',{rId:'${r.id}',gIdx:${gIdx}})`;
        break;
      }

      <span class="bn-ic">👥</span><span class="bn-lbl">Players</span>
    </button>
    <button class="bnav-btn bnav-score ${atScore?'act':''}" onclick="${scoreHandler}">
      <span class="bn-ic">✏️</span><span class="bn-lbl">Score</span>
    </button>

}
function pickScoreTarget() {
  // Find first active round, else first upcoming, else round 1
  let target = ROUNDS.find(r => roundStatus(r.id) === 'active')
            || ROUNDS.find(r => roundStatus(r.id) === 'upcoming')
            || ROUNDS[0];
  go('round', {rId: target.id});
}
function topbar(backTo, title) {
  let back = '';
  if (backTo) {
    const optsStr = JSON.stringify(backTo.o || {}).replace(/"/g, '&quot;');
    back = `<button class="backbtn" onclick="go('${backTo.v}',${optsStr})">← Back</button>`;
  }
  const u = currentUser();
  const adminCls = u && u.kind === 'admin' ? 'admin' : '';
  const userPill = u ? `<button class="user-pill ${adminCls}" onclick="if(confirm('Log out?'))logout()"><span class="ud"></span>${esc(userLabel())}</button>` : '';
  return `<div class="top"><h1><span class="cup">🏆</span> ${title}</h1>${back || userPill}</div>`;
}

}

    const pillTxt = st === 'done' ? 'FINAL' : (st === 'active' ? 'LIVE' : 'UPCOMING');
    const leads = t1.total > t2.total ? 'T1 wins' : (t2.total > t1.total ? 'T2 wins' : 'Tied');
    h += `<div class="round-card ${st}" onclick="go('round',{rId:'${r.id}'})">

        <span class="pill ${pillCls}">${pillTxt}</span>

  if (r.note) h += `<div class="note">ℹ️ ${esc(r.note)}</div>`;
  h += `<div class="sec-h"><span>Groups</span><span style="color:var(--dim);font-weight:500;text-transform:none;">Tap to score</span></div>`;
  r.groups.forEach((g, gi) => {
    h += `<div class="group-card" onclick="go('group',{rId:'${r.id}',gIdx:${gi}})">
      <div class="group-h">
        <span class="gt">Group ${gi+1}</span>
        <span style="font-size:11px;color:var(--dim);">${g.length} players</span>
      </div>
      <div class="group-pls">`;
    g.forEach(pid => {
      const p = PMAP[pid];
      const {diff, holes} = quotaDiffFor(pid, r.id);
      const scStr = holes === 0 ? '' : `<span class="csc ${diffClass(diff)}">${fmtDiff(diff)}</span>`;
      h += `<span class="chip"><span class="cd t${p.t}"></span>${esc(p.name)}${scStr}</span>`;
    });
    h += `</div></div>`;
  });
  return h;
}
function renderGroup() {
  const r = ROUNDS.find(x => x.id === S.rId);
  if (!r) return renderHome();
  const group = r.groups[S.gIdx];
  if (!group) return renderHome();
  const pars = parsFor(r.id);
  const locked = !!S.locks[r.id];
  let h = topbar({v:'round', o:{rId:r.id}}, `${esc(r.short)} · G${S.gIdx+1}`);

  // Round switcher
  h += `<div class="gsw-lbl">Round</div><div class="gsw">`;
  ROUNDS.forEach(rr => {
    h += `<button class="gsw-btn ${rr.id===r.id?'act':''}" onclick="switchScoreRound('${rr.id}')">
      <span class="gsw-n">R${rr.id.replace('r','')}</span>
      <span class="gsw-s">${esc(rr.short)}</span>
    </button>`;
  });
  h += `</div>`;

  // Group switcher
  h += `<div class="gsw-lbl">Group</div><div class="gsw gsw-grp">`;
  r.groups.forEach((g, idx) => {
    const nms = g.map(pid => PMAP[pid] && PMAP[pid].name).filter(Boolean);
    const short = nms.map(n => n.slice(0,3)).join('/');
    h += `<button class="gsw-btn ${idx===S.gIdx?'act':''}" onclick="go('group',{rId:'${r.id}',gIdx:${idx}})">
      <span class="gsw-n">G${idx+1}</span>
      <span class="gsw-s">${esc(short)}</span>
    </button>`;
  });
  h += `</div>`;

  if (locked) h += `<div class="note" style="text-align:center;">🔒 Round is locked. Unlock in Admin to edit scores.</div>`;
  else if (!userCanEditGroup(r.id, S.gIdx)) {
    h += `<div class="note" style="text-align:center;background:rgba(138,146,168,.1);border-color:var(--border);color:var(--muted);">👁️ View only — switch to your own group to edit scores.</div>`;
  }
  h += `<div class="sc-mode-toggle">
    <button class="${S.scMode==='hole'?'active':''}" onclick="setScMode('hole')">Hole by Hole</button>
    <button class="${S.scMode==='card'?'active':''}" onclick="setScMode('card')">Full Scorecard</button>
  </div>`;
  if (S.scMode === 'hole') h += renderGroupHoleMode(r, group, pars);
  else h += renderGroupCardMode(r, group, pars);
  return h;
}

function switchScoreRound(rId) {
  // Switch round and land on group 1 of that round
  go('group', {rId: rId, gIdx: 0});
}

function renderGroupHoleMode(r, group, pars) {
  const i = Math.max(0, Math.min(17, S.scHole|0));
  const par = pars[i];

  // Hole strip
  let strip = `<div class="hs-strip">`;
  for (let k = 0; k < 18; k++) {
    let hasAny = false;
    for (const pid of group) {
      const sc = (S.scores[r.id]||{})[pid] || [];
      if (parseInt(sc[k])) { hasAny = true; break; }
    }
    const cls = k===i ? 'act' : (hasAny ? 'has' : '');
    strip += `<div class="hcell ${cls}" onclick="gotoHole(${k})">${k+1}<span class="num">p${pars[k]}</span></div>`;
  }
  strip += `</div>`;

  // Hole header
  let h = strip;
  h += `<div class="hs-hdr">
    <div class="hnum">Hole ${i+1}</div>
    <div class="hpar">Par ${par}</div>
    <div class="hlbl">${par===3?'Short':(par===5?'Long':'Middle')}</div>
  </div>`;

  // Player rows
  group.forEach(pid => {
    const p = PMAP[pid];
    const sc = (S.scores[r.id]||{})[pid] || [];
    const v = parseInt(sc[i]) || 0;
    let vcls = 'empty';
    if (v > 0) {
      const d = v - par;
      if (d <= -2) vcls = 'eagle';
      else if (d === -1) vcls = 'birdie';
      else if (d === 0) vcls = 'par';
      else if (d === 1) vcls = 'bogey';
      else vcls = 'bad';
    }
    // running totals thru this hole
    let rt = 0, rp = 0, rh = 0;
    for (let k = 0; k <= i; k++) {
      const sv = parseInt(sc[k]);
      if (sv) { rt += sv; rp += pars[k]; rh++; }
    }
    const {diff, pts, q, holes} = quotaDiffFor(pid, r.id);
    const thruTxt = rh > 0 ? `Thru ${rh}: ${rt} (${fmtDiff(rt-rp)}) · ${pts} pts` : 'Not started';
    h += `<div class="hs-plr">
      <div class="hs-nm">
        <div class="n"><span class="dot t${p.t}"></span>${esc(p.name)} <span style="color:var(--dim);font-size:11px;font-weight:400;">Q${q}</span></div>
        <div class="m">${thruTxt}</div>
      </div>
      <div class="hs-step">
        <button onclick="stepScore('${pid}',${i},-1)">−</button>
        <div class="hs-val ${vcls}" onclick="showNumPad('${pid}',${i})">${v>0?v:'—'}</div>
        <button onclick="stepScore('${pid}',${i},1)">+</button>
      </div>
    </div>`;
  });

  // Nav buttons
  const prevDis = i === 0 ? 'disabled' : '';
  const nextDis = i === 17 ? 'disabled' : '';
  h += `<div class="hs-nav">
    <button ${prevDis} onclick="gotoHole(${i-1})">← Hole ${i}</button>
    <button class="next" ${nextDis} onclick="gotoHole(${i+1})">Hole ${i+2} →</button>
  </div>`;

  // Running quota strip
  h += `<div class="hs-quota-strip ${group.length===2?'g2':''}">`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const {diff, holes, gross, toPar} = quotaDiffFor(pid, r.id);
    h += `<div class="qq">
      <div class="qn"><span class="dot t${p.t}"></span>${esc(p.name)}</div>
      <div class="qg ${diffClass(diff)}">${holes===0?'—':fmtDiff(diff)}</div>
      <div class="qd">${holes===0?'':gross+' ('+fmtDiff(toPar)+')'}</div>
    </div>`;
  });
  h += `</div>`;

  return h;
}

function renderGroupCardMode(r, group, pars) {
  const outPar = pars.slice(0,9).reduce((a,b)=>a+b,0);
  const inPar  = pars.slice(9,18).reduce((a,b)=>a+b,0);
  let h = `<div class="sc-wrap"><div class="sc-scroll"><table class="sc-table">
    <thead><tr><th class="lbl-col">Hole</th>`;
  for (let i=1;i<=9;i++)  h += `<th>${i}</th>`;
  h += `<th class="tot-col">Out</th>`;
  for (let i=10;i<=18;i++) h += `<th>${i}</th>`;
  h += `<th class="tot-col">In</th><th class="tot-col">Tot</th></tr></thead>
    <tbody><tr class="par-row"><td class="lbl-col">Par</td>`;
  for (let i=0;i<9;i++)  h += `<td>${pars[i]}</td>`;
  h += `<td class="tot-col">${outPar}</td>`;
  for (let i=9;i<18;i++) h += `<td>${pars[i]}</td>`;
  h += `<td class="tot-col">${inPar}</td><td class="tot-col">${outPar+inPar}</td></tr>`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const sc = ((S.scores[r.id]||{})[pid]) || new Array(18).fill('');
    let outT=0, inT=0, outHas=false, inHas=false;
    for (let i=0;i<9;i++)  { const v=parseInt(sc[i]); if(v>0){outT+=v; outHas=true;} }
    for (let i=9;i<18;i++) { const v=parseInt(sc[i]); if(v>0){inT+=v;  inHas=true;}  }
    h += `<tr><td class="lbl-col">${esc(p.name)} <span style="color:var(--dim);font-size:10px;">T${p.t}</span></td>`;
    for (let i=0;i<9;i++)  h += scCell(r.id, pid, i, sc[i], pars[i]);
    h += `<td class="tot-col">${outHas?outT:''}</td>`;
    for (let i=9;i<18;i++) h += scCell(r.id, pid, i, sc[i], pars[i]);
    h += `<td class="tot-col">${inHas?inT:''}</td>`;
    h += `<td class="tot-col">${(outHas||inHas)?(outT+inT):''}</td></tr>`;
  });
  h += `</tbody></table></div></div>`;
  h += `<div class="sec-h"><span>Quota</span></div><div class="card flat">`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const {diff, pts, q, holes, gross, toPar} = quotaDiffFor(pid, r.id);
    h += `<div class="qbar">
      <span><span class="dot t${p.t}"></span>${esc(p.name)} <span style="color:var(--dim);font-size:11px;">Q=${q}</span></span>
      <span>
        <span class="qlbl" style="margin-right:8px;">${holes===0?holes+'h':gross+' ('+fmtDiff(toPar)+')'}</span>
        <span class="qv">${pts}<span style="color:var(--dim);">/${q}</span></span>
        <span class="qv ${diffClass(diff)}" style="margin-left:10px;min-width:32px;display:inline-block;text-align:right;">${holes===0?'—':fmtDiff(diff)}</span>
      </span>
    </div>`;
  });
  h += `</div>`;
  h += `<div class="legend">
    <span><b style="color:var(--warn)">8</b>eagle</span>
    <span><b style="color:var(--good)">4</b>birdie</span>
    <span><b>2</b>par</span>
    <span><b style="color:var(--muted)">1</b>bogey</span>
    <span><b style="color:var(--dim)">0</b>dbl+</span>
  </div>`;
  return h;
}

function gotoHole(k) {
  if (k < 0 || k > 17) return;
  S.scHole = k;
  window.scrollTo(0, 0);
  render();
}

async function stepScore(pid, i, delta) {
  const rId = S.rId;
  if (S.locks[rId]) { alert('Round is locked.'); return; }
  const sc = ((S.scores[rId]||{})[pid]) || new Array(18).fill('');
  const cur = parseInt(sc[i]) || 0;
  const par = parsFor(rId)[i];
  let next;
  if (cur === 0) next = delta > 0 ? par : par - 1;
  else next = cur + delta;
  if (next < 1) next = 1;
  if (next > 15) next = 15;
  await setScore(rId, pid, i, next);
}

async function showNumPad(pid, i) {
  if (S.locks[S.rId]) { alert('Round is locked.'); return; }
  const cur = ((S.scores[S.rId]||{})[pid] || [])[i] || '';
  const v = prompt('Enter score for hole ' + (i+1), cur);
  if (v === null) return;
  if (v === '' || v === '0') { await setScore(S.rId, pid, i, ''); return; }
  const n = parseInt(v);
  if (!(n >= 1 && n <= 15)) return;
  await setScore(S.rId, pid, i, n);
}
function scCell(rId, pid, i, v, par) {
  const sv = parseInt(v);
  let cls = '';
  if (sv > 0) {
    const d = sv - par;
    if (d <= -2) cls = 'eagle';
    else if (d === -1) cls = 'birdie';
    else if (d === 0) cls = 'par';
    else if (d === 1) cls = 'bogey';
    else cls = 'bad';
  }
  return `<td class="sc-cell ${cls}"><input class="sc-inp" type="number" inputmode="numeric" min="1" max="15" value="${sv>0?sv:''}" onchange="setScore('${rId}','${pid}',${i},this.value)" onfocus="this.select()"></td>`;
}
async function setScore(rId, pid, i, val) {
  if (S.locks[rId]) { alert('Round is locked. Unlock in Admin to edit.'); return; }
  if (!isAdmin()) {
    const myPid = userPlayerId();
    if (!myPid) { alert('Read-only mode.'); return; }
    const r = ROUNDS.find(x => x.id === rId);
    const myGroup = r && r.groups.find(g => g.includes(myPid));
    if (!myGroup || !myGroup.includes(pid)) { alert('You can only score players in your own group.'); return; }
  }
  const v = parseInt(val);
  if (!S.scores[rId]) S.scores[rId] = {};
  if (!S.scores[rId][pid]) S.scores[rId][pid] = new Array(18).fill('');
  S.scores[rId][pid][i] = (v>0 && v<20) ? v : '';
  await fbPatch('scores/' + rId, {[pid]: S.scores[rId][pid]});
  render();
}
function renderPlayer() {
  const p = PMAP[S.pId];
  if (!p) return renderHome();
  let h = topbar({v:'home', o:{subTab:'players'}}, esc(p.full));
  h += `<div class="card flat">
    <div class="phead">
      <div>
        <div class="pn">${esc(p.name)} <span class="pill t${p.t}" style="margin-left:6px;">Team ${p.t}</span></div>
        <div class="pm">${esc(p.full)} · HI ${p.hi.toFixed(1)} · CH ${courseHcp(p.id)} · Quota ${quotaFor(p.id)}</div>
      </div>
    </div>`;
  let trip = 0, tripGross = 0, tripToPar = 0, tripRoundsPlayed = 0;
  ROUNDS.forEach(r => {
    const {diff, pts, q, holes, gross, toPar} = quotaDiffFor(p.id, r.id);
    if (holes > 0) { trip += diff; tripGross += gross; tripToPar += toPar; tripRoundsPlayed++; }
    const st = holes === 0 ? 'Upcoming' : (holes < 18 ? `${holes} of 18` : 'Final');
    const grossTxt = holes === 0 ? '' : `<span class="qlbl" style="margin-right:8px;">${gross} (${fmtDiff(toPar)})</span>`;
    h += `<div class="qbar">
      <span>
        <span style="font-size:13px;font-weight:500;">${esc(r.short)}</span>
        <div class="qlbl" style="margin-top:2px;">${st}</div>
      </span>
      <span>
        ${grossTxt}
        <span class="qlbl">${pts}/${q}</span>
        <span class="qv ${diffClass(diff)}" style="margin-left:12px;font-size:15px;">${holes===0?'—':fmtDiff(diff)}</span>
      </span>
    </div>`;
  });
  h += `<div class="qbar" style="background:var(--bg2);">
    <span style="font-weight:600;">Trip Total${tripRoundsPlayed>0?' <span class="qlbl" style="font-weight:500;">· '+tripGross+' ('+fmtDiff(tripToPar)+')</span>':''}</span>
    <span class="qv ${diffClass(trip)}" style="font-size:18px;">${fmtDiff(trip)}</span>
  </div></div>`;
  return h;
}
function renderSetup() {
  let h = topbar({v:'home', o:{}}, 'Admin');
  h += `<div class="note">Lock a round to prevent any edits to scores or pars. Reset a round to wipe all scores for that round.</div>`;
  h += `<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:10px;">Round Controls</div>`;
  ROUNDS.forEach(r => {
    const locked = !!S.locks[r.id];
    const st = roundStatus(r.id);
    const stLbl = st === 'done' ? 'FINAL' : (st === 'active' ? 'LIVE' : 'Upcoming');
    h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;">
      <div style="min-width:0;flex:1;">
        <div style="font-size:13px;font-weight:600;">${locked?'🔒 ':''}${esc(r.short)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px;">${esc(r.date)} · ${esc(r.time)} · ${stLbl}</div>
      </div>
      <button class="chip" style="background:${locked?'var(--warn)':'var(--bg2)'};color:${locked?'#1a1405':'var(--text)'};border:1px solid var(--border);font-weight:600;padding:6px 10px;" onclick="toggleLock('${r.id}')">${locked?'Unlock':'Lock'}</button>
      <button class="chip" style="background:var(--bg2);color:var(--bad);border:1px solid var(--border);font-weight:600;padding:6px 10px;" onclick="resetRound('${r.id}')">Reset</button>
    </div>`;
  });
  h += `</div>`;
  h += `<div class="note" style="margin-top:12px;">Set par for each hole per course (defaults to generic par 72). Override course handicaps for any player if their playing handicap isn't just their rounded index.</div>`;
  ROUNDS.forEach((r) => {
    const pars = parsFor(r.id);
    const total = pars.reduce((a,b)=>a+b,0);
    const isCustom = S.pars[r.id] != null;
    h += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div>
          <div style="font-size:14px;font-weight:600;">${esc(r.short)}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:2px;">${isCustom?'Custom':'Default'} · Par ${total}</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Front 9</div>
      <div class="settings-grp">`;
    for (let i=0;i<9;i++) h += `<input class="par-inp" type="number" inputmode="numeric" min="3" max="6" value="${pars[i]}" onchange="setPar('${r.id}',${i},this.value)">`;
    h += `</div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;">Back 9</div>
      <div class="settings-grp">`;
    for (let i=9;i<18;i++) h += `<input class="par-inp" type="number" inputmode="numeric" min="3" max="6" value="${pars[i]}" onchange="setPar('${r.id}',${i},this.value)">`;
    h += `</div></div>`;
  });
  h += `<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px;">Course Handicaps</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Default = rounded Handicap Index. Override if course handicap differs.</div>`;
  PLAYERS.forEach(p => {
    const curr = courseHcp(p.id);
    h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:13px;"><span class="dot t${p.t}"></span>${esc(p.name)} <span style="color:var(--dim);font-size:11px;margin-left:4px;">HI ${p.hi.toFixed(1)}</span></span>
      <span style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:10px;color:var(--dim);">Q=${36-curr}</span>
        <input class="par-inp" style="width:54px;" type="number" inputmode="numeric" value="${curr}" onchange="setChcp('${p.id}',this.value)">
      </span>
    </div>`;
  });
  h += `</div>`;
  return h;
}
async function setPar(rId, i, val) {
  if (S.locks[rId]) { alert('Round is locked. Unlock in Admin to edit.'); return; }
  const v = parseInt(val);
  if (v < 3 || v > 6) return;
  if (!S.pars[rId] || S.pars[rId].length !== 18) S.pars[rId] = [...DEFAULT_PAR];
  S.pars[rId][i] = v;
  await fbPatch('pars', {[rId]: S.pars[rId]});
  render();
}
async function setChcp(pid, val) {
  const v = parseInt(val);
  if (isNaN(v)) return;
  S.chcp[pid] = v;
  await fbPatch('chcp', {[pid]: v});
  render();
}
async function toggleLock(rId) {
  const cur = !!S.locks[rId];
  S.locks[rId] = !cur;
  await fbPatch('locks', {[rId]: S.locks[rId]});
  render();
}
async function resetRound(rId) {
  if (S.locks[rId]) { alert('Unlock the round before resetting.'); return; }
  const r = ROUNDS.find(x => x.id === rId);
  if (!confirm('Wipe ALL scores for ' + r.short + '? This cannot be undone.')) return;
  S.scores[rId] = {};
  await fbPatch('scores', {[rId]: null});
  render();
}
async function init() {
  const existing = await fbLoad();
  const isOldFormat = existing && (existing.players || existing.round || (existing.scores && (existing.scores.Modes || existing.scores.Joey || existing.scores.McGins)));
  if (isOldFormat) {
    await fbPut({ version:2, scores:{}, pars:{}, chcp:{} });
  }
  const d = await fbLoad();
  const hasAnyScores = d && d.scores && Object.keys(d.scores).length > 0;
  if (!hasAnyScores && Object.keys(SEED).length > 0) {
    const payload = { version:2, scores:{}, pars:{}, chcp:{} };
    Object.entries(SEED).forEach(([rId, players]) => {
      payload.scores[rId] = payload.scores[rId] || {};
      Object.entries(players).forEach(([pid, arr]) => { payload.scores[rId][pid] = arr; });
    });
    Object.entries(PAR_SEED).forEach(([rId, arr]) => { payload.pars[rId] = arr; });
    await fbPut(payload);
  }
  await syncFromFB();
  fbSubscribe();
}
render();
init();
</script>
</body>
</html>

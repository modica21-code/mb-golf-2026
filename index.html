<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>MB 2026 · Quota Cup</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0e1a; --bg2:#0f1524; --card:#151b2e; --card2:#1a2138;
  --border:#252d45; --text:#e8ecf4; --muted:#8892a8; --dim:#5a6378;
  --t1:#d4b06a; --t1d:#b5934f; --t2:#4aa3d9; --t2d:#3885b8;
  --good:#4ade80; --bad:#f87171; --warn:#fbbf24;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
html,body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
body { min-height:100vh; min-height:100dvh; padding-bottom:env(safe-area-inset-bottom); }
#app { max-width:520px; margin:0 auto; padding:0 14px 80px; padding-top:env(safe-area-inset-top); }
.top { padding:14px 0 10px; border-bottom:1px solid var(--border); margin-bottom:14px; position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 85%,transparent); z-index:10; padding-top:calc(14px + env(safe-area-inset-top)); display:flex; justify-content:space-between; align-items:center; }
.top h1 { font-size:15px; font-weight:600; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.top h1 .cup { color:var(--t1); }
.backbtn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:500; font-family:inherit; }
.backbtn:active { transform:scale(.96); }
.tabs { display:flex; gap:6px; padding:4px; background:var(--card); border-radius:12px; margin-bottom:16px; }
.tab { flex:1; padding:10px 6px; text-align:center; border-radius:8px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; border:none; background:transparent; font-family:inherit; }
.tab.active { background:var(--card2); color:var(--text); box-shadow:var(--shadow); }
.tab:active:not(.active) { background:var(--bg2); }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; }
.card.flat { padding:0; overflow:hidden; }
.scoreboard { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.team-card { padding:14px 12px; border-radius:14px; background:var(--card); border:1px solid var(--border); position:relative; overflow:hidden; }
.team-card.t1 { border-left:4px solid var(--t1); }
.team-card.t2 { border-left:4px solid var(--t2); }
.team-card .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:600; letter-spacing:.5px; margin-bottom:4px; }
.team-card .big { font-size:32px; font-weight:700; line-height:1; margin-bottom:2px; font-variant-numeric:tabular-nums; }
.team-card.t1 .big { color:var(--t1); }
.team-card.t2 .big { color:var(--t2); }
.team-card .sub { font-size:11px; color:var(--dim); }
.team-card.leading::after { content:"LEAD"; position:absolute; top:6px; right:8px; font-size:9px; font-weight:700; letter-spacing:.8px; color:var(--good); background:rgba(74,222,128,.12); padding:2px 6px; border-radius:4px; }
.sec-h { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; font-weight:600; margin:20px 4px 8px; display:flex; justify-content:space-between; align-items:center; }
.round-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; }
.round-card:active { transform:scale(.99); }
.round-card .rnum { display:inline-block; width:22px; height:22px; background:var(--bg2); border-radius:6px; text-align:center; line-height:22px; font-size:11px; font-weight:700; color:var(--muted); margin-right:8px; }
.round-card.done .rnum { background:var(--t1); color:var(--bg); }
.round-card.active .rnum { background:var(--warn); color:var(--bg); }
.round-card .rt { font-size:15px; font-weight:600; }
.round-card .rs { font-size:12px; color:var(--muted); margin-left:30px; }
.round-card .rscore { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:13px; }
.round-card .rscore .ts { display:flex; gap:16px; }
.round-card .rscore .ts-1 { color:var(--t1); font-weight:600; }
.round-card .rscore .ts-2 { color:var(--t2); font-weight:600; }
.round-card .rscore .rw { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.lb { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.lb-row { display:grid; grid-template-columns:26px 1fr 50px 60px; align-items:center; padding:9px 12px; border-bottom:1px solid var(--border); font-size:14px; cursor:pointer; }
.lb-row:last-child { border-bottom:none; }
.lb-row:active { background:var(--bg2); }
.lb-row .rk { color:var(--dim); font-size:12px; font-variant-numeric:tabular-nums; }
.lb-row .nm { display:flex; align-items:center; gap:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-row .tdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.lb-row .tdot.t1 { background:var(--t1); }
.lb-row .tdot.t2 { background:var(--t2); }
.lb-row .q { text-align:right; color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
.lb-row .sc { text-align:right; font-weight:600; font-variant-numeric:tabular-nums; }
.lb-row .sc.pos { color:var(--good); }
.lb-row .sc.neg { color:var(--bad); }
.lb-hd { display:grid; grid-template-columns:26px 1fr 50px 60px; padding:8px 12px; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; font-weight:600; background:var(--bg2); border-bottom:1px solid var(--border); }
.lb-hd .q, .lb-hd .sc { text-align:right; }
.group-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; }
.group-card:active { transform:scale(.99); }
.group-h { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.group-h .gt { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.group-pls { display:flex; flex-wrap:wrap; gap:6px; }
.chip { display:inline-flex; align-items:center; gap:5px; padding:5px 9px; background:var(--bg2); border-radius:20px; font-size:12px; border:1px solid var(--border); }
.chip .cd { width:6px; height:6px; border-radius:50%; }
.chip .cd.t1 { background:var(--t1); }
.chip .cd.t2 { background:var(--t2); }
.chip .csc { margin-left:4px; font-weight:600; font-variant-numeric:tabular-nums; }
.chip .csc.pos { color:var(--good); }
.chip .csc.neg { color:var(--bad); }
.sc-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:12px; }
.sc-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.sc-table { border-collapse:collapse; min-width:100%; font-size:12px; }
.sc-table th, .sc-table td { padding:6px 4px; text-align:center; border-right:1px solid var(--border); border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; min-width:32px; }
.sc-table th { background:var(--bg2); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.sc-table .lbl-col { text-align:left; background:var(--card2); font-weight:500; min-width:84px; max-width:84px; position:sticky; left:0; z-index:2; border-right:2px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:10px; }
.sc-table thead .lbl-col { z-index:3; background:var(--bg2); }
.sc-table .tot-col { background:var(--card2); font-weight:600; }
.sc-table .par-row td { background:var(--bg2); color:var(--muted); font-size:11px; font-weight:500; }
.sc-table .sc-cell.eagle { background:rgba(251,191,36,.25); color:var(--warn); font-weight:700; }
.sc-table .sc-cell.birdie { background:rgba(74,222,128,.15); color:var(--good); font-weight:600; }
.sc-table .sc-cell.par { color:var(--text); }
.sc-table .sc-cell.bogey { color:var(--muted); }
.sc-table .sc-cell.bad { color:var(--dim); }
.sc-table .sc-inp { width:100%; height:30px; background:transparent; border:none; color:inherit; text-align:center; font-size:13px; font-family:inherit; font-variant-numeric:tabular-nums; padding:0; outline:none; font-weight:inherit; }
.sc-table .sc-inp:focus { background:var(--warn); color:var(--bg); }
.qbar { display:flex; justify-content:space-between; padding:10px 14px; background:var(--card); font-size:12px; border-bottom:1px solid var(--border); }
.qbar:last-child { border-bottom:none; }
.qbar .qlbl { color:var(--muted); text-transform:uppercase; font-size:10px; letter-spacing:.6px; font-weight:600; }
.qbar .qv { font-weight:600; font-variant-numeric:tabular-nums; }
.qbar .qv.pos { color:var(--good); }
.qbar .qv.neg { color:var(--bad); }
.settings-grp { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:8px; }
.par-inp { width:100%; height:32px; background:var(--bg2); border:1px solid var(--border); color:var(--text); text-align:center; border-radius:6px; font-size:12px; font-family:inherit; font-variant-numeric:tabular-nums; }
.par-inp:focus { outline:1px solid var(--warn); background:var(--card); }
.foot { text-align:center; color:var(--dim); font-size:11px; padding:20px 0; line-height:1.6; }
.note { background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.3); color:var(--warn); padding:8px 12px; border-radius:8px; font-size:12px; margin-bottom:10px; }
.pill { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
.pill.t1 { background:rgba(212,176,106,.15); color:var(--t1); }
.pill.t2 { background:rgba(74,163,217,.15); color:var(--t2); }
.pill.live { background:rgba(74,222,128,.15); color:var(--good); }
.pill.done { background:rgba(138,146,168,.15); color:var(--muted); }
.legend { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--muted); padding:8px 0; }
.legend b { color:var(--text); margin-right:3px; }
.phead { padding:12px; background:var(--card2); border-bottom:1px solid var(--border); }
.phead .pn { font-size:15px; font-weight:600; }
.phead .pm { font-size:11px; color:var(--muted); margin-top:4px; }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; }
.dot.t1 { background:var(--t1); }
.dot.t2 { background:var(--t2); }
.row { display:flex; gap:10px; }
.row > * { flex:1; }

/* Dashboard */
.dash-hero { background:linear-gradient(160deg,var(--card2),var(--card)); border:1px solid var(--border); border-radius:18px; padding:18px 16px 14px; margin-bottom:14px; }
.dash-hello { font-size:13px; color:var(--muted); font-weight:500; }
.dash-status { font-size:15px; font-weight:700; margin-top:4px; }
.dash-streak { display:flex; gap:6px; margin-top:14px; }
.rs-box { flex:1; padding:8px 4px; border-radius:8px; text-align:center; font-size:11px; font-weight:700; letter-spacing:.4px; background:var(--bg2); color:var(--dim); border:1px solid var(--border); }
.rs-box.rs-t1 { background:var(--t1); color:var(--bg); border-color:var(--t1); }
.rs-box.rs-t2 { background:var(--t2); color:var(--bg); border-color:var(--t2); }
.rs-box.rs-tie { background:var(--warn); color:var(--bg); border-color:var(--warn); }
.rs-box.rs-up { background:var(--bg2); color:var(--dim); }

.dash-resume { background:rgba(251,191,36,.08); border:1px solid var(--warn); border-radius:14px; padding:14px; margin-bottom:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:8px; }
.dash-resume:active { transform:scale(.99); }
.dash-resume .rsm-lbl { font-size:11px; color:var(--warn); text-transform:uppercase; letter-spacing:.7px; font-weight:700; }
.dash-resume .rsm-r { font-size:14px; font-weight:600; margin-top:4px; }
.dash-resume .rsm-p { font-size:11px; color:var(--dim); margin-top:2px; }
.dash-resume .rsm-arrow { font-size:22px; color:var(--warn); }

.dash-live { background:var(--card); border:2px solid var(--good); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer; box-shadow:0 0 14px rgba(74,222,128,.12); }
.dash-live:active { transform:scale(.995); }
.dash-live-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:12px; }
.dash-live-tm { display:flex; flex-direction:column; gap:3px; align-items:flex-end; font-size:13px; font-variant-numeric:tabular-nums; }
.dash-live-t { font-weight:600; }
.dash-live-t.t1 { color:var(--t1); }
.dash-live-t.t2 { color:var(--t2); }
.dash-live-t b { font-size:14px; }
.dash-live-groups { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.dlg { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:8px 4px; text-align:center; }
.dlg.mine { border-color:var(--warn); background:rgba(251,191,36,.1); }
.dlg-n { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.dlg.mine .dlg-n { color:var(--warn); }
.dlg-h { font-size:12px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums; }

.dash-leaders-mini { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.dlm { display:grid; grid-template-columns:22px 1fr 40px 50px; align-items:center; gap:6px; padding:5px 0; font-size:13px; }
.dlm-r { color:var(--dim); font-size:11px; font-variant-numeric:tabular-nums; }
.dlm-n { display:flex; align-items:center; gap:6px; font-weight:600; }
.dlm-h { color:var(--muted); font-size:11px; text-align:right; font-variant-numeric:tabular-nums; }
.dlm-d { text-align:right; font-weight:700; font-variant-numeric:tabular-nums; }
.dlm-d.pos { color:var(--good); }
.dlm-d.neg { color:var(--bad); }

.dash-next { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.dash-next:active { transform:scale(.99); }
.dash-next .rsm-arrow { font-size:22px; color:var(--muted); }

.dash-recap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:14px; cursor:pointer; }
.dash-recap:active { transform:scale(.995); }
.dr-row { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; }
.dr-side { padding:10px; border-radius:10px; background:var(--bg2); text-align:center; }
.dr-side.t1 { border-left:3px solid var(--t1); }
.dr-side.t2 { border-right:3px solid var(--t2); }
.dr-side.win { background:rgba(74,222,128,.1); }
.dr-side .lb { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.dr-side .vl { font-size:22px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums; }
.dr-side.t1 .vl { color:var(--t1); }
.dr-side.t2 .vl { color:var(--t2); }
.dr-vs { font-size:11px; color:var(--good); font-weight:700; letter-spacing:.7px; }
.dr-top { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); text-align:center; }
.dr-top b { color:var(--text); }

.dash-leaders { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:14px; }
.dl-row { display:grid; grid-template-columns:32px 1fr auto; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.dl-row:last-child { border-bottom:none; }
.dl-row:active { background:var(--bg2); }
.dl-medal { font-size:18px; }
.dl-nm { font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px; }
.dl-d { font-weight:700; font-size:15px; font-variant-numeric:tabular-nums; }
.dl-d.pos { color:var(--good); }
.dl-d.neg { color:var(--bad); }

.dash-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px; }
.ds-tile { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 6px; text-align:center; }
.ds-tile.ds-tap { cursor:pointer; transition:transform .1s; }
.ds-tile.ds-tap:active { transform:scale(.96); background:var(--bg2); }
.ds-tile .ds-n { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
.ds-tile .ds-l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-top:3px; }

/* Stat detail view */
.stat-hero { background:var(--card); border:2px solid var(--border); border-radius:16px; padding:20px 16px; text-align:center; margin-bottom:14px; }
.sh-emoji { font-size:30px; }
.sh-val { font-size:44px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; margin:8px 0 4px; }
.sh-ttl { font-size:14px; font-weight:600; letter-spacing:.5px; }
.sh-d { font-size:11px; color:var(--muted); margin-top:6px; }
.stat-tabs { display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; margin-bottom:12px; }
.stat-tabs::-webkit-scrollbar { display:none; }
.stat-tabs button { flex-shrink:0; background:var(--card); border:1px solid var(--border); color:var(--muted); padding:7px 12px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.stat-tabs button.sel { background:var(--t1); color:var(--bg); border-color:var(--t1); }
.stat-tbl { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.stat-tbl .st-hd { display:grid; grid-template-columns:26px 1fr 60px 70px; padding:8px 12px; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; font-weight:700; background:var(--bg2); border-bottom:1px solid var(--border); }
.stat-tbl .st-hd span:nth-child(3), .stat-tbl .st-hd span:nth-child(4) { text-align:right; }
.stat-tbl .st-row { display:grid; grid-template-columns:26px 1fr 60px 70px; padding:11px 12px; border-bottom:1px solid var(--border); font-size:14px; cursor:pointer; align-items:center; }
.stat-tbl .st-row:last-child { border-bottom:none; }
.stat-tbl .st-row:active { background:var(--bg2); }
.stat-tbl .st-r { color:var(--dim); font-size:12px; font-variant-numeric:tabular-nums; }
.stat-tbl .st-nm { display:flex; align-items:center; gap:6px; font-weight:600; overflow:hidden; }
.stat-tbl .st-m { text-align:right; font-variant-numeric:tabular-nums; font-size:15px; }
.stat-tbl .st-v { text-align:right; font-variant-numeric:tabular-nums; font-size:13px; color:var(--muted); font-weight:500; }
.stat-tbl .st-v.pos { color:var(--good); font-weight:700; }
.stat-tbl .st-v.neg { color:var(--bad); font-weight:700; }

/* Big leaderboard view */
.lb-hero { background:linear-gradient(160deg,var(--card2),var(--card)); border:1px solid var(--border); border-radius:16px; padding:16px 14px; margin-bottom:14px; }
.lb-hero-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; font-weight:700; }
.lb-hero-lead { font-size:14px; font-weight:700; margin-top:4px; }

.lb-mode { display:flex; gap:4px; background:var(--bg2); border-radius:10px; padding:3px; margin-bottom:12px; }
.lb-mode button { flex:1; padding:10px; border-radius:7px; border:none; background:transparent; color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; text-transform:uppercase; letter-spacing:.5px; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
.lb-mode button.sel { background:var(--card2); color:var(--text); box-shadow:var(--shadow); }

.lb3 { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; }
.lb3-hd { display:grid; grid-template-columns:24px 1.5fr 44px 60px 60px 60px; padding:10px 12px; font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; font-weight:700; background:var(--bg2); border-bottom:1px solid var(--border); }
.lb3-hd span:nth-child(n+3) { text-align:right; }
.lb3-h { cursor:pointer; padding:2px 0; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
.lb3-h:active { opacity:.6; }
.lb3-h.lb2-h-sel, .lb2-h.lb2-h-sel { color:var(--t1); }

const DEFAULT_PAR = [4,4,3,4,5,4,3,4,5,4,4,3,5,4,3,4,4,5];

async function fbPatch(path, data) { try { return await fetch(FB_URL + "/mbquota/" + path + ".json", {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}); } catch(e){} }

  const d = await fbLoad();

let S = { view:'home', rId:null, gIdx:null, pId:null, scores:{}, pars:{}, chcp:{}, locks:{}, subTab:'standings', scHole:0, scMode:'hole' };
try { const lg = JSON.parse(localStorage.getItem('mbq.lastGroup')||'null'); if (lg && lg.rId) { S._lastGroup = lg; } } catch(e){}
try { const m = localStorage.getItem('mbq.scMode'); if (m==='card'||m==='hole') S.scMode = m; } catch(e){}

/* AUTH ─────────────────────────────────────────
   Password = lastname123 OR nickname123 (case-insensitive)
   admin123 = full admin access
   ─────────────────────────────────────────── */
function lastNameOf(p) {
  return (p.full || '').split(' ').slice(-1)[0].toLowerCase();
}
function authMatch(pw) {
  if (!pw) return null;
  const k = pw.trim().toLowerCase().replace(/\s+/g,'');
  if (k === 'admin123') return 'admin';
  // Disambiguate Biedrzycki (Bwu and Bob both): force them to use nicknames
  if (k === 'biedrzycki123') return null;
  for (const p of PLAYERS) {
    if (k === lastNameOf(p) + '123') return p.id;
    if (k === p.name.toLowerCase() + '123') return p.id;
    if (k === p.id.toLowerCase() + '123') return p.id;
  }
  return null;
}
function currentUser() {
  // Returns {kind:'admin'} | {kind:'player', p, pid} | null
  if (!S._user) return null;

function userPlayerId() { const u = currentUser(); return u && u.kind==='player' ? u.pid : null; }
function userCanEditGroup(rId, gIdx) {
  if (isAdmin()) return true;
  const pid = userPlayerId();
  if (!pid) return false;
  const r = ROUNDS.find(x => x.id === rId);

  if (!result) { return false; }
  S._user = result;
  try { localStorage.setItem('mbq.user', result); } catch(e){}
  // Default last group to logged-in player's first round/group
  if (result !== 'admin' && !S._lastGroup) {
    for (const r of ROUNDS) {

function courseHcp(pId) { if (S.chcp[pId] != null) return S.chcp[pId]; return Math.round(PMAP[pId].hi); }
function quotaFor(pId) { return 36 - courseHcp(pId); }

  if (S.pars[rId] && S.pars[rId].length === 18) return S.pars[rId];
  const r = ROUNDS.find(x => x.id === rId);
  return (r && r.par && r.par.length === 18) ? r.par : DEFAULT_PAR;
}
function hcpFor(rId) {
  const r = ROUNDS.find(x => x.id === rId);
  return (r && r.hcp && r.hcp.length === 18) ? r.hcp : DEFAULT_HCP;
}
/* Strokes a player gets on a single hole, based on course handicap and hole's stroke index */
function strokesOnHole(courseHandicap, holeStrokeIndex) {
  if (!courseHandicap || courseHandicap < 1) return 0;
  let strokes = 0;
  // 1st pass: holes ranked 1..18 each get a stroke up to the player's handicap
  if (courseHandicap >= holeStrokeIndex) strokes++;
  // 2nd pass: handicaps 19+ award an additional stroke on harder holes
  if (courseHandicap > 18 && (courseHandicap - 18) >= holeStrokeIndex) strokes++;
  // 3rd pass: handicaps 37+ (just in case)
  if (courseHandicap > 36 && (courseHandicap - 36) >= holeStrokeIndex) strokes++;
  return strokes;
}
/* Strokes a player gets across a SET of completed holes (running) */
function strokesReceivedOn(rId, pId, holesPlayedIdxArr) {
  const ch = courseHcp(pId);
  const hcp = hcpFor(rId);
  let total = 0;
  holesPlayedIdxArr.forEach(i => { total += strokesOnHole(ch, hcp[i]); });
  return total;
}
function pointsForHole(score, par) {
  if (!score || score < 1) return null;
  const d = score - par;
  if (d <= -3) return 16;
  if (d === -2) return 8;
  if (d === -1) return 4;
  if (d === 0)  return 2;
  if (d === 1)  return 1;
  return 0;
}
function pointsForPlayerRound(pId, rId) {
  const sc = (S.scores[rId] || {})[pId];
  if (!sc) return {pts:0, holes:0, gross:0, toPar:0, strokes:0};
  const pars = parsFor(rId);
  const hcp = hcpFor(rId);
  const ch = courseHcp(pId);
  let pts = 0, holes = 0, gross = 0, parSum = 0, strokes = 0;
  for (let i = 0; i < 18; i++) {
    const s = parseInt(sc[i]);
    if (s && s > 0) {
      pts += pointsForHole(s, pars[i]);
      holes++; gross += s; parSum += pars[i];
      strokes += strokesOnHole(ch, hcp[i]);
    }
  }
  return {pts, holes, gross, toPar: gross - parSum, strokes};
}
function quotaDiffFor(pId, rId) {
  const r = pointsForPlayerRound(pId, rId);
  const q = quotaFor(pId);
  if (r.holes === 0) return {diff:0, pts:0, q, holes:0, gross:0, toPar:0, strokes:0, net:null};
  return {diff: r.pts - q, pts:r.pts, q, holes:r.holes, gross:r.gross, toPar:r.toPar, strokes:r.strokes, net: r.gross - r.strokes};
}
function teamRoundScore(tNum, rId) {
  let total = 0, pts = 0, any = false, allFull = true;
  PLAYERS.filter(p => p.t === tNum).forEach(p => {
    const x = quotaDiffFor(p.id, rId);
    if (x.holes > 0) any = true;
    if (x.holes < 18) allFull = false;
    total += x.diff;
    pts += x.pts;
  });
  return {total, pts, complete: allFull, any};
}
function roundStatus(rId) {
  const t1 = teamRoundScore(1, rId), t2 = teamRoundScore(2, rId);
  if (!t1.any && !t2.any) return 'upcoming';
  if (t1.complete && t2.complete) return 'done';
  return 'active';
}
function tripScore(tNum) { let total = 0; ROUNDS.forEach(r => { total += teamRoundScore(tNum, r.id).total; }); return total; }
function tripPoints(tNum) { let pts = 0; ROUNDS.forEach(r => { pts += teamRoundScore(tNum, r.id).pts; }); return pts; }

/* ── Dashboard helpers ─────────────────────────── */
function activeRound() { return ROUNDS.find(r => roundStatus(r.id) === 'active'); }
function lastCompletedRound() {
  for (let i = ROUNDS.length - 1; i >= 0; i--) {
    if (roundStatus(ROUNDS[i].id) === 'done') return ROUNDS[i];
  }
  return null;
}
function nextRound() {
  return ROUNDS.find(r => roundStatus(r.id) === 'upcoming');
}
function tripBirdiesEagles() {
  let bd = 0, eg = 0, pars = 0, bog = 0, dbl = 0, holes = 0, gross = 0, parSum = 0;
  ROUNDS.forEach(r => {
    const ps = parsFor(r.id);
    PLAYERS.forEach(p => {
      const sc = (S.scores[r.id]||{})[p.id] || [];
      for (let i = 0; i < 18; i++) {
        const s = parseInt(sc[i]); if (!s) continue;
        const d = s - ps[i];
        if (d <= -2) eg++;
        else if (d === -1) bd++;
        else if (d === 0) pars++;
        else if (d === 1) bog++;
        else if (d >= 2) dbl++;
        holes++; gross += s; parSum += ps[i];
      }
    });
  });
  return {bd, eg, pars, bog, dbl, holes, toPar: gross - parSum};
}
function topPerformers(rId, n) {
  // Returns top n players for given round (or full trip if rId === null) by quota diff
  const rows = PLAYERS.map(p => {
    if (rId === null) {
      let total = 0, played = 0;
      ROUNDS.forEach(r => {
        const x = quotaDiffFor(p.id, r.id);
        if (x.holes >= 18) { total += x.diff; played++; }
      });
      return { p, diff: played > 0 ? total : null, played };
    }
    const x = quotaDiffFor(p.id, rId);
    return { p, diff: x.holes > 0 ? x.diff : null, holes: x.holes };
  }).filter(r => r.diff !== null);
  rows.sort((a,b) => b.diff - a.diff);
  return rows.slice(0, n);
}
function bestSingleRound() {
  let best = null;
  ROUNDS.forEach(r => {
    PLAYERS.forEach(p => {
      const x = quotaDiffFor(p.id, r.id);
      if (x.holes >= 18) {
        if (!best || x.diff > best.diff) best = { p, r, ...x };
      }
    });
  });
  return best;
}
function teamWinsByRound() {
  // Returns array of 'T1' | 'T2' | 'tie' | null (null = upcoming)
  return ROUNDS.map(r => {
    if (roundStatus(r.id) === 'upcoming') return null;
    const t1 = teamRoundScore(1, r.id).pts;
    const t2 = teamRoundScore(2, r.id).pts;
    if (t1 > t2) return 'T1';
    if (t2 > t1) return 'T2';
    return 'tie';
  });
}
function liveRoundLeaders(rId) {
  // Return all players in this round sorted by current quota diff (only those with holes played)
  return PLAYERS.map(p => {
    const x = quotaDiffFor(p.id, rId);
    return { p, ...x };
  }).filter(r => r.holes > 0).sort((a,b) => b.diff - a.diff);
}
function groupProgress(r) {
  // Returns { gIdx, players, minHoles, maxHoles, label }
  return r.groups.map((g, gIdx) => {
    let minH = 18, maxH = 0;
    g.forEach(pid => {
      const sc = (S.scores[r.id]||{})[pid] || [];
      const h = sc.filter(x => parseInt(x)).length;
      if (h < minH) minH = h;
      if (h > maxH) maxH = h;
    });
    return { gIdx, players:g, minH, maxH };
  });
}
function go(view, opts) {
  opts = opts || {};
  const groupChanged = (opts.rId !== undefined && opts.rId !== S.rId) || (opts.gIdx !== undefined && opts.gIdx !== S.gIdx);
  S.view = view;
  if (opts.rId !== undefined) S.rId = opts.rId;
  if (opts.gIdx !== undefined) S.gIdx = opts.gIdx;
  if (opts.pId !== undefined) S.pId = opts.pId;
  if (opts.subTab !== undefined) S.subTab = opts.subTab;
  if (opts.statKind !== undefined) S.statKind = opts.statKind;
  if (view === 'group') {
    try { localStorage.setItem('mbq.lastGroup', JSON.stringify({rId:S.rId, gIdx:S.gIdx})); } catch(e){}
    if (groupChanged) S.scHole = firstUnscoredHole(S.rId, S.gIdx);
  }
  window.scrollTo(0, 0);
  render();
}
function firstUnscoredHole(rId, gIdx) {
  const r = ROUNDS.find(x => x.id === rId);
  if (!r) return 0;
  const g = r.groups[gIdx] || [];
  for (let i = 0; i < 18; i++) {
    for (const pid of g) {
      const sc = (S.scores[rId] || {})[pid] || [];
      if (!parseInt(sc[i])) return i;
    }
  }
  return 0;
}
function setScMode(m) {
  S.scMode = m;
  try { localStorage.setItem('mbq.scMode', m); } catch(e){}
  render();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDiff(n) { if (n === 0) return 'E'; return (n > 0 ? '+' : '') + n; }
function diffClass(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }
function render() {
  const app = document.getElementById('app');
  if (!currentUser()) { app.innerHTML = renderLogin(); return; }
  let html = '';
  if      (S.view === 'home')   html = renderHome();
  else if (S.view === 'round')  html = renderRound();
  else if (S.view === 'group')  html = renderGroup();
  else if (S.view === 'player') html = renderPlayer();
  else if (S.view === 'setup')  { if (isAdmin()) html = renderSetup(); else html = renderHome(); }
  else if (S.view === 'stat')   html = renderStat();
  else if (S.view === 'lboard') html = renderLboard();
  else html = renderHome();
  app.innerHTML = html + renderBottomNav();
}

      </div>
    </div>`;
  }

  // ─── Schedule (full list, condensed) ───
  if (S.subTab !== 'players') {
    h += `<div class="sec-h"><span>📅 Schedule</span><span style="color:var(--dim);font-weight:500;text-transform:none;">Tap a round</span></div>`;
    h += renderRoundList();
  } else {
    h += `<div class="sec-h"><span>👥 All Players</span></div>`;
    h += renderAllPlayersList();
  }

  h += `<div class="dash-sub-toggle">
    <button class="${S.subTab!=='players'?'sel':''}" onclick="go('home',{subTab:'standings'})">📅 Schedule</button>
    <button class="${S.subTab==='players'?'sel':''}" onclick="go('home',{subTab:'players'})">👥 All Players</button>
  </div>`;

  h += `<div class="foot">Trip ${completed}/${ROUNDS.length} rounds done · ${stats.eg} eagles · ${stats.bd} birdies<br>Quota = 36 − Course Handicap<br>Bogey 1 · Par 2 · Birdie 4 · Eagle 8</div>`;
  return h;
}

function renderRoundStreak(wins) {

function renderLboard() {
  // Sub-tabs: Trip (combined) + each round
  const scope = S.lbScope || 'trip';
  let sort = S.lbSort || 'topar';

  let h = topbar(null, 'Leaderboards');

  // Team scoreboard at top — context varies by scope
  let t1Pts, t2Pts, t1Diff, t2Diff, t1Label, t2Label, leadLine, subLabel;
  if (scope === 'trip') {
    t1Pts = tripPoints(1); t2Pts = tripPoints(2);
    t1Diff = tripScore(1); t2Diff = tripScore(2);
    subLabel = 'Trip Total';
  } else {
    const s1 = teamRoundScore(1, scope), s2 = teamRoundScore(2, scope);
    t1Pts = s1.pts; t2Pts = s2.pts;
    t1Diff = s1.total; t2Diff = s2.total;
    const r = ROUNDS.find(x => x.id === scope);
    subLabel = r ? r.short : 'Round';
  }
  const hasAny = t1Pts > 0 || t2Pts > 0;
  const lead1 = t1Pts > t2Pts, lead2 = t2Pts > t1Pts;
  if (!hasAny) leadLine = '<span style="color:var(--dim);">No scores yet</span>';
  else if (t1Pts === t2Pts) leadLine = '<span style="color:var(--warn);">All Square</span>';
  else if (lead1) leadLine = `<span style="color:var(--t1);">Team 1 leads by ${t1Pts-t2Pts} pts</span>`;
  else leadLine = `<span style="color:var(--t2);">Team 2 leads by ${t2Pts-t1Pts} pts</span>`;

  h += `<div class="lb-hero">
    <div class="lb-hero-lbl">${esc(subLabel)}</div>
    <div class="lb-hero-lead">${leadLine}</div>
    <div class="scoreboard" style="margin:12px 0 0;">
      <div class="team-card t1 ${lead1?'leading':''}">
        <div class="lbl">Team 1</div>
        <div class="big">${t1Pts}</div>
        <div class="sub">${fmtDiff(t1Diff)} vs Q</div>
      </div>
      <div class="team-card t2 ${lead2?'leading':''}">
        <div class="lbl">Team 2</div>
        <div class="big">${t2Pts}</div>
        <div class="sub">${fmtDiff(t2Diff)} vs Q</div>
      </div>
    </div>
  </div>`;

  // Scope selector
  h += `<div class="stat-tabs">
    <button class="${scope==='trip'?'sel':''}" onclick="S.lbScope='trip';render()">Trip Total</button>
    ${ROUNDS.map(r => `<button class="${scope===r.id?'sel':''}" onclick="S.lbScope='${r.id}';render()">${esc(r.short.split(' ').slice(0,2).join(' '))}</button>`).join('')}
  </div>`;

  // Compute rows for the chosen scope
  const rows = PLAYERS.map(p => {
    const ch = courseHcp(p.id);
    if (scope === 'trip') {
      let g = 0, n = 0, parTotal = 0, holes = 0, qPts = 0, qTarget = 0, qDiff = 0, roundsPlayed = 0, anyHoles = false;
      ROUNDS.forEach(r => {
        const x = quotaDiffFor(p.id, r.id);
        if (x.holes > 0) {
          g += x.gross; parTotal += x.gross - x.toPar; holes += x.holes; qPts += x.pts;
          n += x.net;
          qTarget += x.q;     // accumulate quota target for every round the player has started
          anyHoles = true;
        }
        if (x.holes >= 18) {
          qDiff += x.diff;
          roundsPlayed++;
        }
      });
      const allDone = roundsPlayed === ROUNDS.length;
      // Find the active (in-progress) round and how many holes done in it
      let activeR = null, activeHoles = 0;
      for (const r of ROUNDS) {
        const sc = (S.scores[r.id]||{})[p.id] || [];
        const hCount = sc.filter(x => parseInt(x)).length;
        if (hCount > 0 && hCount < 18) { activeR = r; activeHoles = hCount; break; }
      }
      let thruTxt;
      if (roundsPlayed === ROUNDS.length) thruTxt = 'Final';
      else if (activeR) thruTxt = `${activeHoles}/18`;
      else if (roundsPlayed > 0) thruTxt = `${roundsPlayed}r done`;
      else thruTxt = '—';
      return {
        p, ch,
        gross: anyHoles ? g : null,
        net: anyHoles ? n : null,
        toPar: anyHoles ? g - parTotal : null,
        holes,
        roundsPlayed,
        allDone,
        thru: thruTxt,
        qPts: anyHoles ? qPts : null,
        qTarget: anyHoles ? qTarget : null,
        qDiff: anyHoles ? (qPts - qTarget) : null,
        partial: anyHoles && !allDone
      };
    } else {
      const x = quotaDiffFor(p.id, scope);
      return {
        p, ch,
        gross: x.holes > 0 ? x.gross : null,
        net: x.holes > 0 ? x.net : null,
        toPar: x.holes > 0 ? x.toPar : null,
        holes: x.holes,
        thru: x.holes === 0 ? '—' : (x.holes >= 18 ? 'F' : `${x.holes}`),
        qPts: x.holes > 0 ? x.pts : null,
        qTarget: x.holes > 0 ? x.q : null,
        qDiff: x.holes > 0 ? x.diff : null,
        partial: x.holes > 0 && x.holes < 18
      };
    }
  });

  // Sort
  function sortKey(row) {
    if (sort === 'gross')   return row.gross == null ? Infinity : row.gross;
    if (sort === 'net')     return row.net == null ? Infinity : row.net;
    if (sort === 'quota')   return row.qDiff == null ? -Infinity : -row.qDiff;
    if (sort === 'qpts')    return row.qPts == null ? -Infinity : -row.qPts;
    if (sort === 'qtarget') return row.qTarget == null ? -Infinity : -row.qTarget;
    if (sort === 'topar')   return row.toPar == null ? Infinity : row.toPar;
    return Infinity;
  }
  // View mode — Scoring (gross/net/toPar) or Quota (target/pts/diff)
  const mode = S.lbMode || 'scoring';

  // Default sort per mode
  if (!S.lbSort) {
    sort = mode === 'scoring' ? 'topar' : 'quota';
  } else {
    // If user switched modes without picking a sort, use the right default
    if (mode === 'scoring' && !['gross','net','topar'].includes(sort)) sort = 'topar';
    if (mode === 'quota'   && !['qtarget','qpts','quota'].includes(sort)) sort = 'quota';
  }

  rows.sort((a,b) => sortKey(a) - sortKey(b));

  // Mode toggle
  h += `<div class="lb-mode">
    <button class="${mode==='scoring'?'sel':''}" onclick="S.lbMode='scoring';S.lbSort=null;render()">Scoring</button>
    <button class="${mode==='quota'?'sel':''}" onclick="S.lbMode='quota';S.lbSort=null;render()">Quota</button>
  </div>`;

  // Column header helper with sort icon + onclick
  function hd(key, label) {
    const isSel = sort === key;
    const arrow = isSel ? ' ↓' : '';
    const cls = isSel ? 'lb2-h-sel' : '';
    return `<span class="lb2-h ${cls}" onclick="S.lbSort='${key}';render()">${label}${arrow}</span>`;
  }

  // Table — different columns per mode
  if (mode === 'scoring') {
    h += `<div class="lb3">
      <div class="lb3-hd">
        <span></span>
        <span>Player</span>
        <span>Thru</span>
        ${hd('gross', 'Gross')}
        ${hd('net',   'Net')}
        ${hd('topar', '±Par')}
      </div>`;
    rows.forEach((row, i) => {
      const tdot = `<span class="tdot t${row.p.t}"></span>`;
      const grossTxt = row.gross == null ? '—' : (row.partial ? `<span style="color:var(--muted)">${row.gross}*</span>` : row.gross);
      const netTxt = row.net == null ? '—' : row.net;
      const tpClass = row.toPar == null ? '' : diffClass(row.toPar);
      const tpTxt = row.toPar == null ? '—' : fmtDiff(row.toPar);
      h += `<div class="lb3-row" onclick="go('player',{pId:'${row.p.id}'})">
        <span class="lb3-rk">${i+1}</span>
        <span class="lb3-nm">${tdot}<div class="lb3-nm-i"><div>${esc(row.p.name)}</div><div class="lb3-nm-s">CH ${row.ch}</div></div></span>
        <span class="lb3-thru">${row.thru}</span>
        <span class="lb3-v">${grossTxt}</span>
        <span class="lb3-v">${netTxt}</span>
        <span class="lb3-v ${tpClass}">${tpTxt}</span>
      </div>`;
    });
    h += `</div>`;
  } else {
    // Quota mode
    h += `<div class="lb3">
      <div class="lb3-hd">
        <span></span>
        <span>Player</span>
        <span>Thru</span>
        ${hd('qtarget', 'Target')}
        ${hd('qpts',    'Earned')}
        ${hd('quota',   '±Q')}
      </div>`;
    rows.forEach((row, i) => {
      const tdot = `<span class="tdot t${row.p.t}"></span>`;
      const qTargetTxt = row.qTarget == null ? '—' : row.qTarget;
      const qPtsTxt = row.qPts == null ? '—' : row.qPts;
      const qClass = row.qDiff == null ? '' : diffClass(row.qDiff);
      const qTxt = row.qDiff == null ? '—' : fmtDiff(row.qDiff);
      h += `<div class="lb3-row" onclick="go('player',{pId:'${row.p.id}'})">
        <span class="lb3-rk">${i+1}</span>
        <span class="lb3-nm">${tdot}<div class="lb3-nm-i"><div>${esc(row.p.name)}</div><div class="lb3-nm-s">CH ${row.ch}</div></div></span>
        <span class="lb3-thru">${row.thru}</span>
        <span class="lb3-v lb3-dim">${qTargetTxt}</span>
        <span class="lb3-v">${qPtsTxt}</span>
        <span class="lb3-v ${qClass}">${qTxt}</span>
      </div>`;
    });
    h += `</div>`;
  }

  // Footer note
  if (scope === 'trip') {
    h += `<div class="foot">Tap headers to sort · Tap a player for full breakdown<br>${mode==='scoring'?'Net = Gross − strokes received on holes played':'Target = quota goal per round · Earned = points scored · ±Q = difference'}<br>* indicates round in progress</div>`;
  } else {
    h += `<div class="foot">Showing ${esc(ROUNDS.find(r=>r.id===scope).course)}<br>Tap headers to sort · Tap a player for full breakdown</div>`;
  }

  return h;
}

function renderStat() {
  const kind = S.statKind || 'eg';
  const meta = {
    eg:      { title:'Eagles',  desc:'Holes played at 2 or more under par', emoji:'🦅', color:'var(--warn)', match:(d)=>d<=-2 },
    bd:      { title:'Birdies', desc:'Holes played at 1 under par',          emoji:'🐦', color:'var(--good)', match:(d)=>d===-1 },
    pars:    { title:'Pars',    desc:'Holes played even to par',             emoji:'🎯', color:'var(--text)', match:(d)=>d===0 },
    bog:     { title:'Bogeys',  desc:'Holes played at 1 over par',           emoji:'🟨', color:'var(--muted)', match:(d)=>d===1 },
    dbl:     { title:'Doubles or Worse', desc:'Holes played at 2+ over par', emoji:'💥', color:'var(--bad)',  match:(d)=>d>=2 },
    holes:   { title:'Holes Played', desc:'Total holes with a score entered', emoji:'⛳', color:'var(--text)', match:()=>true },
    scoring: { title:'To Par',  desc:'Total gross strokes vs. par',          emoji:'📈', color:'var(--text)', match:()=>true },
  }[kind] || null;

  if (!meta) return renderHome();

  let h = topbar({v:'home', o:{}}, meta.title);

  // Compute per-player tallies
  const rows = PLAYERS.map(p => {
    let count = 0, toPar = 0, holes = 0;
    const perRound = ROUNDS.map(r => {
      const ps = parsFor(r.id);
      const sc = (S.scores[r.id]||{})[p.id] || [];
      let rCount = 0, rTp = 0, rH = 0;
      for (let i = 0; i < 18; i++) {
        const s = parseInt(sc[i]); if (!s) continue;
        const d = s - ps[i];
        rH++; rTp += d;
        if (meta.match(d)) rCount++;
      }
      count += rCount; toPar += rTp; holes += rH;
      return { r, count:rCount, toPar:rTp, holes:rH };
    });
    return { p, count, toPar, holes, perRound };
  });

  // Sort: holes view sorts by holes played desc; scoring by toPar asc (best first); others by count desc
  if (kind === 'holes') rows.sort((a,b) => b.holes - a.holes || quotaFor(b.p.id) - quotaFor(a.p.id));
  else if (kind === 'scoring') rows.sort((a,b) => (a.holes===0?9999:a.toPar) - (b.holes===0?9999:b.toPar));
  else rows.sort((a,b) => b.count - a.count || b.holes - a.holes);

  // Header card
  const totalCount = rows.reduce((s,r) => s + r.count, 0);
  const totalHoles = rows.reduce((s,r) => s + r.holes, 0);
  const totalToPar = rows.reduce((s,r) => s + r.toPar, 0);
  let headerVal = '';
  if (kind === 'holes') headerVal = totalHoles;
  else if (kind === 'scoring') headerVal = totalHoles===0?'—':fmtDiff(totalToPar);
  else headerVal = totalCount;

  h += `<div class="stat-hero" style="border-color:${meta.color};">
    <div class="sh-emoji">${meta.emoji}</div>
    <div class="sh-val" style="color:${meta.color};">${headerVal}</div>
    <div class="sh-ttl">Trip ${esc(meta.title)}</div>
    <div class="sh-d">${esc(meta.desc)}</div>
  </div>`;

  // Sub-tabs: All Time | By Round
  h += `<div class="stat-tabs">
    <button class="${!S.statRound?'sel':''}" onclick="S.statRound=null;render()">All Rounds</button>
    ${ROUNDS.map(r => `<button class="${S.statRound===r.id?'sel':''}" onclick="S.statRound='${r.id}';render()">${esc(r.short.split(' ').slice(0,2).join(' '))}</button>`).join('')}
  </div>`;

  // Filter rows if a specific round is selected
  let displayRows;
  if (S.statRound) {
    displayRows = rows.map(row => {
      const rd = row.perRound.find(pr => pr.r.id === S.statRound);
      return { p: row.p, count: rd?rd.count:0, toPar: rd?rd.toPar:0, holes: rd?rd.holes:0 };
    });
    if (kind === 'holes') displayRows.sort((a,b) => b.holes - a.holes);
    else if (kind === 'scoring') displayRows.sort((a,b) => (a.holes===0?9999:a.toPar) - (b.holes===0?9999:b.toPar));
    else displayRows.sort((a,b) => b.count - a.count || b.holes - a.holes);
  } else {
    displayRows = rows;
  }

  // Table
  h += `<div class="stat-tbl">
    <div class="st-hd">
      <span></span><span>Player</span>
      <span>${kind==='scoring'?'Holes':(kind==='holes'?'Played':'Count')}</span>
      <span>${kind==='scoring'?'To Par':(kind==='holes'?'To Par':'Per Rd')}</span>
    </div>`;
  displayRows.forEach((row, i) => {
    let rightVal = '', middleVal = '';
    if (kind === 'holes') { middleVal = row.holes; rightVal = row.holes>0?fmtDiff(row.toPar):'—'; }
    else if (kind === 'scoring') { middleVal = row.holes+'h'; rightVal = row.holes>0?fmtDiff(row.toPar):'—'; }
    else { middleVal = row.count; rightVal = row.holes>0 ? (row.count / (row.holes/18)).toFixed(1) : '—'; }
    const rCls = kind === 'scoring' ? diffClass(row.toPar) : '';
    h += `<div class="st-row" onclick="go('player',{pId:'${row.p.id}'})">
      <span class="st-r">${i+1}</span>
      <span class="st-nm"><span class="tdot t${row.p.t}"></span>${esc(row.p.name)}<span style="color:var(--dim);font-size:11px;margin-left:6px;">${row.p.hi.toFixed(1)}</span></span>
      <span class="st-m" style="color:${row.count>0||kind==='holes'||kind==='scoring'?'var(--text)':'var(--dim)'};font-weight:${(row.count>0&&kind!=='holes'&&kind!=='scoring')?'700':'500'};">${middleVal}</span>
      <span class="st-v ${rCls}">${rightVal}</span>
    </div>`;
  });
  h += `</div>`;

  return h;
}
function renderRoundList() {

    </div>

function switchScoreRound(rId) {
  // Switch round and land on group 1 of that round

}

function renderGroupHoleMode(r, group, pars) {
  const i = Math.max(0, Math.min(17, S.scHole|0));
  const par = pars[i];

  // Hole strip
  let strip = `<div class="hs-strip">`;
  for (let k = 0; k < 18; k++) {
    let hasAny = false;
    for (const pid of group) {
      const sc = (S.scores[r.id]||{})[pid] || [];
      if (parseInt(sc[k])) { hasAny = true; break; }
    }
    const cls = k===i ? 'act' : (hasAny ? 'has' : '');
    strip += `<div class="hcell ${cls}" onclick="gotoHole(${k})">${k+1}<span class="num">p${pars[k]}</span></div>`;
  }
  strip += `</div>`;

  // Hole header
  const hcps = hcpFor(r.id);
  const holeHcp = hcps[i];
  let h = strip;
  h += `<div class="hs-hdr">
    <div class="hnum">Hole ${i+1} · HCP ${holeHcp}</div>
    <div class="hpar">Par ${par}</div>
    <div class="hlbl">${par===3?'Short':(par===5?'Long':'Middle')}</div>
  </div>`;

  // Player rows
  group.forEach(pid => {
    const p = PMAP[pid];
    const sc = (S.scores[r.id]||{})[pid] || [];
    const v = parseInt(sc[i]) || 0;
    let vcls = 'empty';
    if (v > 0) {
      const d = v - par;
      if (d <= -2) vcls = 'eagle';
      else if (d === -1) vcls = 'birdie';
      else if (d === 0) vcls = 'par';
      else if (d === 1) vcls = 'bogey';
      else vcls = 'bad';
    }
    // running totals thru this hole
    let rt = 0, rp = 0, rh = 0, rstrokes = 0;
    for (let k = 0; k <= i; k++) {
      const sv = parseInt(sc[k]);
      if (sv) { rt += sv; rp += pars[k]; rh++; rstrokes += strokesOnHole(courseHcp(pid), hcps[k]); }
    }
    const {diff, pts, q, holes} = quotaDiffFor(pid, r.id);
    const strokesHere = strokesOnHole(courseHcp(pid), holeHcp);
    const dot = strokesHere > 0 ? `<span style="color:var(--warn);font-size:13px;letter-spacing:-1px;">${'•'.repeat(strokesHere)}</span> ` : '';
    const thruTxt = rh > 0 ? `Thru ${rh}: ${rt} gross (${fmtDiff(rt-rp)}) · ${rt-rstrokes} net · ${pts} pts` : 'Not started';
    h += `<div class="hs-plr">
      <div class="hs-nm">
        <div class="n"><span class="dot t${p.t}"></span>${dot}${esc(p.name)} <span style="color:var(--dim);font-size:11px;font-weight:400;">Q${q}</span></div>
        <div class="m">${thruTxt}</div>
      </div>
      <div class="hs-step">
        <button onclick="stepScore('${pid}',${i},-1)">−</button>
        <div class="hs-val ${vcls}" onclick="showNumPad('${pid}',${i})">${v>0?v:'—'}</div>
        <button onclick="stepScore('${pid}',${i},1)">+</button>
      </div>
    </div>`;
  });

  // Nav buttons
  const prevDis = i === 0 ? 'disabled' : '';
  const nextDis = i === 17 ? 'disabled' : '';
  h += `<div class="hs-nav">
    <button ${prevDis} onclick="gotoHole(${i-1})">← Hole ${i}</button>
    <button class="next" ${nextDis} onclick="gotoHole(${i+1})">Hole ${i+2} →</button>
  </div>`;

  // Running quota strip
  h += `<div class="hs-quota-strip ${group.length===2?'g2':''}">`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const {diff, holes, gross, toPar} = quotaDiffFor(pid, r.id);
    h += `<div class="qq">
      <div class="qn"><span class="dot t${p.t}"></span>${esc(p.name)}</div>
      <div class="qg ${diffClass(diff)}">${holes===0?'—':fmtDiff(diff)}</div>
      <div class="qd">${holes===0?'':gross+' ('+fmtDiff(toPar)+')'}</div>
    </div>`;
  });
  h += `</div>`;

  return h;
}

function renderGroupCardMode(r, group, pars) {
  const outPar = pars.slice(0,9).reduce((a,b)=>a+b,0);
  const inPar  = pars.slice(9,18).reduce((a,b)=>a+b,0);
  let h = `<div class="sc-wrap"><div class="sc-scroll"><table class="sc-table">
    <thead><tr><th class="lbl-col">Hole</th>`;
  for (let i=1;i<=9;i++)  h += `<th>${i}</th>`;
  h += `<th class="tot-col">Out</th>`;
  for (let i=10;i<=18;i++) h += `<th>${i}</th>`;
  h += `<th class="tot-col">In</th><th class="tot-col">Tot</th></tr></thead>
    <tbody><tr class="par-row"><td class="lbl-col">Par</td>`;
  for (let i=0;i<9;i++)  h += `<td>${pars[i]}</td>`;
  h += `<td class="tot-col">${outPar}</td>`;
  for (let i=9;i<18;i++) h += `<td>${pars[i]}</td>`;
  h += `<td class="tot-col">${inPar}</td><td class="tot-col">${outPar+inPar}</td></tr>`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const sc = ((S.scores[r.id]||{})[pid]) || new Array(18).fill('');
    let outT=0, inT=0, outHas=false, inHas=false;
    for (let i=0;i<9;i++)  { const v=parseInt(sc[i]); if(v>0){outT+=v; outHas=true;} }
    for (let i=9;i<18;i++) { const v=parseInt(sc[i]); if(v>0){inT+=v;  inHas=true;}  }
    h += `<tr><td class="lbl-col">${esc(p.name)} <span style="color:var(--dim);font-size:10px;">T${p.t}</span></td>`;
    for (let i=0;i<9;i++)  h += scCell(r.id, pid, i, sc[i], pars[i]);
    h += `<td class="tot-col">${outHas?outT:''}</td>`;
    for (let i=9;i<18;i++) h += scCell(r.id, pid, i, sc[i], pars[i]);
    h += `<td class="tot-col">${inHas?inT:''}</td>`;
    h += `<td class="tot-col">${(outHas||inHas)?(outT+inT):''}</td></tr>`;
  });
  h += `</tbody></table></div></div>`;
  h += `<div class="sec-h"><span>Quota</span></div><div class="card flat">`;
  group.forEach(pid => {
    const p = PMAP[pid];
    const {diff, pts, q, holes, gross, toPar} = quotaDiffFor(pid, r.id);
    h += `<div class="qbar">
      <span><span class="dot t${p.t}"></span>${esc(p.name)} <span style="color:var(--dim);font-size:11px;">Q=${q}</span></span>
      <span>
        <span class="qlbl" style="margin-right:8px;">${holes===0?holes+'h':gross+' ('+fmtDiff(toPar)+')'}</span>
        <span class="qv">${pts}<span style="color:var(--dim);">/${q}</span></span>
        <span class="qv ${diffClass(diff)}" style="margin-left:10px;min-width:32px;display:inline-block;text-align:right;">${holes===0?'—':fmtDiff(diff)}</span>
      </span>
    </div>`;
  });
  h += `</div>`;
  h += `<div class="legend">
    <span><b style="color:var(--warn)">8</b>eagle</span>
    <span><b style="color:var(--good)">4</b>birdie</span>
    <span><b>2</b>par</span>
    <span><b style="color:var(--muted)">1</b>bogey</span>
    <span><b style="color:var(--dim)">0</b>dbl+</span>
  </div>`;
  return h;
}

function gotoHole(k) {
  if (k < 0 || k > 17) return;
  S.scHole = k;
  window.scrollTo(0, 0);
  render();
}

async function stepScore(pid, i, delta) {
  const rId = S.rId;
  if (S.locks[rId]) { alert('Round is locked.'); return; }
  const sc = ((S.scores[rId]||{})[pid]) || new Array(18).fill('');
  const cur = parseInt(sc[i]) || 0;
  const par = parsFor(rId)[i];
  let next;
  if (cur === 0) next = delta > 0 ? par : par - 1;
  else next = cur + delta;
  if (next < 1) next = 1;
  if (next > 15) next = 15;
  await setScore(rId, pid, i, next);
}

function showNumPad(pid, i) {
  if (S.locks[S.rId]) { alert('Round is locked.'); return; }
  if (!isAdmin()) {
    const myPid = userPlayerId();
    if (!myPid) { alert('Read-only mode.'); return; }
    const r = ROUNDS.find(x => x.id === S.rId);
    const myGroup = r && r.groups.find(g => g.includes(myPid));
    if (!myGroup || !myGroup.includes(pid)) { alert('You can only score players in your own group.'); return; }
  }
  S._numpad = { pid, hole: i };
  renderNumpad();
}
function closeNumPad() { S._numpad = null; renderNumpad(); }
async function numpadSet(v) {
  const np = S._numpad; if (!np) return;
  S._numpad = null;
  renderNumpad();
  await setScore(S.rId, np.pid, np.hole, v);
}
function renderNumpad() {
  let el = document.getElementById('numpad-root');
  if (!el) {
    el = document.createElement('div');
    el.id = 'numpad-root';
    document.body.appendChild(el);
  }
  if (!S._numpad) { el.innerHTML = ''; return; }
  const { pid, hole } = S._numpad;
  const p = PMAP[pid];
  const r = ROUNDS.find(x => x.id === S.rId);
  const par = parsFor(r.id)[hole];
  // Build a row of common scores: par-2 to par+5
  const opts = [];
  for (let v = Math.max(1, par - 2); v <= par + 5; v++) opts.push(v);
  const cur = ((S.scores[r.id]||{})[pid] || [])[hole] || '';
  let btns = '';
  opts.forEach(v => {
    const d = v - par;
    let extra = '', lbl = String(v);
    if (d === 0) { extra = 'np-par'; lbl = `${v}<br><span style="font-size:10px;font-weight:500;color:var(--dim);">PAR</span>`; }
    else if (d === -1) { extra = 'np-bd'; lbl = `${v}<br><span style="font-size:10px;font-weight:500;">BIRDIE</span>`; }
    else if (d <= -2) { extra = 'np-eg'; lbl = `${v}<br><span style="font-size:10px;font-weight:500;">EAGLE</span>`; }
    else if (d === 1) { lbl = `${v}<br><span style="font-size:10px;font-weight:500;color:var(--dim);">BOGEY</span>`; }
    else if (d === 2) { lbl = `${v}<br><span style="font-size:10px;font-weight:500;color:var(--dim);">DBL</span>`; }
    else if (d >= 3) { lbl = `${v}<br><span style="font-size:10px;font-weight:500;color:var(--dim);">+${d}</span>`; }
    btns += `<button class="${extra}" onclick="numpadSet(${v})">${lbl}</button>`;
  });
  el.innerHTML = `<div class="np-overlay" onclick="if(event.target===this)closeNumPad()">
    <div class="np-sheet">
      <div class="np-hdr">
        <div class="pn">${esc(p.name)} · Hole ${hole+1} · Par ${par}</div>
        <div class="ti">${cur ? 'Current: ' + cur : 'Tap a score'}</div>
      </div>
      <div class="np-grid">
        ${btns}
        <button class="np-clear" onclick="numpadSet(null)">Clear</button>
        <button class="np-cancel" onclick="closeNumPad()">Cancel</button>
      </div>
    </div>
  </div>`;
}
function scCell(rId, pid, i, v, par) {
  const sv = parseInt(v);
  let cls = '';
  if (sv > 0) {
    const d = sv - par;
    if (d <= -2) cls = 'eagle';
    else if (d === -1) cls = 'birdie';
    else if (d === 0) cls = 'par';
    else if (d === 1) cls = 'bogey';
    else cls = 'bad';
  }
  return `<td class="sc-cell ${cls}"><input class="sc-inp" type="number" inputmode="numeric" min="1" max="15" value="${sv>0?sv:''}" onchange="setScore('${rId}','${pid}',${i},this.value)" onfocus="this.select()"></td>`;
}
async function setScore(rId, pid, i, val) {
  if (S.locks[rId]) { alert('Round is locked. Unlock in Admin to edit.'); return; }
  if (!isAdmin()) {
    const myPid = userPlayerId();
    if (!myPid) { alert('Read-only mode.'); return; }
    const r = ROUNDS.find(x => x.id === rId);
    const myGroup = r && r.groups.find(g => g.includes(myPid));
    if (!myGroup || !myGroup.includes(pid)) { alert('You can only score players in your own group.'); return; }
  }
  const v = parseInt(val);
  if (!S.scores[rId]) S.scores[rId] = {};
  if (!S.scores[rId][pid]) S.scores[rId][pid] = new Array(18).fill('');
  S.scores[rId][pid][i] = (v>0 && v<20) ? v : '';
  await fbPatch('scores/' + rId, {[pid]: S.scores[rId][pid]});
  render();
}

async function setPar(rId, i, val) {
  if (S.locks[rId]) { alert('Round is locked. Unlock in Admin to edit.'); return; }
  const v = parseInt(val);
  if (v < 3 || v > 6) return;
  if (!S.pars[rId] || S.pars[rId].length !== 18) {
    const r = ROUNDS.find(x => x.id === rId);
    S.pars[rId] = (r && r.par && r.par.length === 18) ? [...r.par] : [...DEFAULT_PAR];
  }
  S.pars[rId][i] = v;
  await fbPatch('pars', {[rId]: S.pars[rId]});
  render();
}
async function setChcp(pid, val) {
  const v = parseInt(val);
  if (isNaN(v)) return;
  S.chcp[pid] = v;
  await fbPatch('chcp', {[pid]: v});
  render();
}
async function toggleLock(rId) {
  const cur = !!S.locks[rId];
  S.locks[rId] = !cur;
  await fbPatch('locks', {[rId]: S.locks[rId]});
  render();
}
async function resetRound(rId) {
  if (S.locks[rId]) { alert('Unlock the round before resetting.'); return; }
  const r = ROUNDS.find(x => x.id === rId);
  if (!confirm('Wipe ALL scores for ' + r.short + '? This cannot be undone.')) return;
  S.scores[rId] = {};
  await fbPatch('scores', {[rId]: null});
  render();
}
async function init() {
  const existing = await fbLoad();
  const isOldFormat = existing && (existing.players || existing.round || (existing.scores && (existing.scores.Modes || existing.scores.Joey || existing.scores.McGins)));
  if (isOldFormat) {
    await fbPut({ version:2, scores:{}, pars:{}, chcp:{} });
  }
  const d = await fbLoad();
  const hasAnyScores = d && d.scores && Object.keys(d.scores).length > 0;
  if (!hasAnyScores && Object.keys(SEED).length > 0) {
    const payload = { version:2, scores:{}, pars:{}, chcp:{} };
    Object.entries(SEED).forEach(([rId, players]) => {
      payload.scores[rId] = payload.scores[rId] || {};
      Object.entries(players).forEach(([pid, arr]) => { payload.scores[rId][pid] = arr; });
    });
    Object.entries(PAR_SEED).forEach(([rId, arr]) => { payload.pars[rId] = arr; });
    await fbPut(payload);
  }
  await syncFromFB();
  fbSubscribe();
}
render();
init();
</script>
